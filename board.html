<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects Board</title>
    <link rel="stylesheet" href="shared.css">
    <link rel="stylesheet" href="linked-items.css">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12131c;
            --bg-card: #181a25;
            --bg-card-hover: #202434;
            --bg-panel: rgba(255, 255, 255, 0.025);
            --bg-overlay: rgba(7, 8, 13, 0.92);
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.14);
            --text-primary: #f3f5ff;
            --text-secondary: #9aa0bb;
            --text-dim: #6d738f;
            --accent-purple: #a855f7;
            --accent-blue: #3b82f6;
            --accent-green: #22c55e;
            --accent-yellow: #eab308;
            --accent-red: #ef4444;
            --shadow-lg: 0 24px 64px rgba(0, 0, 0, 0.42);
            --column-width: 320px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(59, 130, 246, 0.12), transparent 28%),
                radial-gradient(circle at top left, rgba(168, 85, 247, 0.14), transparent 32%),
                linear-gradient(180deg, #0b0b11 0%, #0a0a0f 100%);
            color: var(--text-primary);
            line-height: 1.5;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button, input, select, textarea {
            font: inherit;
        }

        .board-shell {
            height: calc(100vh - 50px);
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .board-header {
            padding: 1.25rem 1.5rem 1rem;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(180deg, rgba(17, 20, 31, 0.9), rgba(13, 14, 22, 0.7));
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .page-title {
            margin: 0;
            font-size: clamp(1.5rem, 3vw, 2rem);
            letter-spacing: -0.03em;
        }

        .sync-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.55rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 999px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.03);
            font-size: 0.82rem;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }

        .filter-group {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.55rem 0.7rem;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
        }

        .filter-label {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .filter-select,
        .modal-input,
        .modal-select,
        .quick-add-input,
        .subtask-input,
        .editor-textarea,
        .notes-textarea {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 12px;
            outline: none;
            transition: 0.18s ease;
        }

        .filter-select,
        .modal-input,
        .modal-select,
        .notes-textarea {
            padding: 0.65rem 0.8rem;
        }

        .filter-select:hover,
        .action-btn:hover,
        .quick-add-trigger:hover,
        .modal-close:hover,
        .subtask-delete:hover,
        .subtask-title-btn:hover,
        .subtask-expand:hover {
            border-color: rgba(168, 85, 247, 0.35);
            background: rgba(168, 85, 247, 0.1);
        }

        .filter-select:focus,
        .modal-input:focus,
        .modal-select:focus,
        .quick-add-input:focus,
        .subtask-input:focus,
        .editor-textarea:focus,
        .notes-textarea:focus {
            border-color: rgba(168, 85, 247, 0.65);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.14);
        }

        .action-btn {
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 0.7rem 0.95rem;
            cursor: pointer;
            transition: 0.18s ease;
        }

        .action-btn.primary {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.28), rgba(59, 130, 246, 0.24));
            border-color: rgba(168, 85, 247, 0.38);
        }

        .action-btn.danger {
            color: #ffd7d7;
            border-color: rgba(239, 68, 68, 0.2);
            background: rgba(239, 68, 68, 0.08);
        }

        .board-viewport {
            flex: 1;
            min-height: 0;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 1.25rem 1.5rem 1.5rem;
        }

        .board-columns {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: var(--column-width);
            gap: 1rem;
            min-height: 100%;
            align-items: start;
        }

        .column {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            max-height: 100%;
            border: 1px solid var(--border);
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(20, 22, 33, 0.9), rgba(14, 16, 24, 0.95));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .column.drag-target {
            border-color: rgba(59, 130, 246, 0.55);
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.03);
        }

        .column-header {
            padding: 1rem 1rem 0.85rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .column-topline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
        }

        .column-title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 700;
        }

        .column-count {
            color: var(--text-dim);
            font-size: 0.82rem;
        }

        .quick-add-trigger {
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px dashed rgba(255, 255, 255, 0.16);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
            border-radius: 10px;
            cursor: pointer;
            transition: 0.18s ease;
        }

        .quick-add {
            display: none;
            gap: 0.5rem;
        }

        .quick-add.active {
            display: flex;
        }

        .quick-add-input,
        .subtask-input {
            flex: 1;
            padding: 0.65rem 0.8rem;
            min-width: 0;
        }

        .quick-add-actions {
            display: flex;
            gap: 0.4rem;
        }

        .card-list {
            flex: 1;
            min-height: 120px;
            overflow-y: auto;
            padding: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .card {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)),
                linear-gradient(135deg, rgba(168, 85, 247, 0.08), rgba(59, 130, 246, 0.05));
            border-radius: 18px;
            padding: 0.95rem;
            cursor: grab;
            transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: rgba(168, 85, 247, 0.25);
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.02)),
                linear-gradient(135deg, rgba(168, 85, 247, 0.12), rgba(59, 130, 246, 0.08));
        }

        .card.dragging {
            opacity: 0.45;
            transform: rotate(1.3deg);
            cursor: grabbing;
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.45rem;
        }

        .card-title {
            margin: 0;
            font-size: 0.98rem;
            font-weight: 700;
        }

        .card-summary {
            margin: 0;
            color: var(--text-secondary);
            font-size: 0.87rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .priority-stars {
            color: #f5c451;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            margin-top: 0.75rem;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.28rem 0.55rem;
            border-radius: 999px;
            font-size: 0.74rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
        }

        .chip.tag {
            color: #e9dcff;
            background: rgba(168, 85, 247, 0.15);
            border-color: rgba(168, 85, 247, 0.2);
        }

        .chip.stage {
            background: rgba(168, 85, 247, 0.14);
            color: #c4b5fd;
        }

        .chip.assignee {
            font-weight: 600;
        }

        .assignee-quinn {
            color: #f5d0fe;
            background: rgba(217, 70, 239, 0.13);
        }

        .assignee-forge {
            color: #fcd7aa;
            background: rgba(249, 115, 22, 0.13);
        }

        .assignee-adam {
            color: #bfdbfe;
            background: rgba(59, 130, 246, 0.13);
        }

        .assignee-scout {
            color: #bbf7d0;
            background: rgba(34, 197, 94, 0.13);
        }

        .assignee-designer {
            color: #fde68a;
            background: rgba(234, 179, 8, 0.13);
        }

        .assignee-unassigned {
            color: #d1d5db;
            background: rgba(107, 114, 128, 0.18);
        }

        .progress-row {
            margin-top: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .progress-bar {
            flex: 1;
            height: 7px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
        }

        .progress-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        .column-empty {
            border: 1px dashed rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 1rem;
            color: var(--text-dim);
            font-size: 0.88rem;
            text-align: center;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 300;
            display: none;
            background: var(--bg-overlay);
            backdrop-filter: blur(10px);
        }

        .modal-overlay.active {
            display: block;
        }

        .modal {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            background: linear-gradient(180deg, rgba(19, 21, 31, 0.99), rgba(10, 12, 19, 0.99));
        }

        .modal-header {
            padding: 1rem 1.25rem;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-title-wrap {
            min-width: 0;
        }

        .modal-title {
            margin: 0;
            font-size: 1.4rem;
        }

        .modal-subtitle {
            margin: 0.25rem 0 0;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .modal-header-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.55rem;
            margin-top: 0.75rem;
        }

        .modal-close {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            cursor: pointer;
            flex-shrink: 0;
        }

        .modal-body {
            min-height: 0;
            overflow: auto;
            padding: 1.2rem;
            display: grid;
            grid-template-columns: minmax(0, 1.6fr) minmax(320px, 0.95fr);
            gap: 1.1rem;
        }

        .modal-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            background: rgba(10, 12, 19, 0.82);
        }

        .panel {
            border: 1px solid var(--border);
            background: var(--bg-panel);
            border-radius: 20px;
            padding: 1rem;
            min-width: 0;
        }

        .panel-title {
            margin: 0 0 0.85rem;
            font-size: 0.92rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
        }

        .editor-meta-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .modal-field {
            display: flex;
            flex-direction: column;
            gap: 0.45rem;
        }

        .modal-field label {
            color: var(--text-secondary);
            font-size: 0.82rem;
        }

        .editor-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
        }

        .editor-tabs {
            display: inline-flex;
            gap: 0.35rem;
            padding: 0.25rem;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
        }

        .editor-tab {
            border: none;
            background: transparent;
            color: var(--text-secondary);
            padding: 0.45rem 0.8rem;
            border-radius: 999px;
            cursor: pointer;
        }

        .editor-tab.active {
            color: var(--text-primary);
            background: rgba(168, 85, 247, 0.16);
        }

        .editor-shell {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 0.9rem;
        }

        .editor-shell.preview-only .editor-pane.write-pane,
        .editor-shell.write-only .editor-pane.preview-pane {
            display: none;
        }

        .editor-shell.preview-only,
        .editor-shell.write-only {
            grid-template-columns: minmax(0, 1fr);
        }

        .editor-pane {
            min-width: 0;
        }

        .editor-textarea,
        .notes-textarea {
            width: 100%;
            resize: vertical;
        }

        .editor-textarea {
            min-height: 400px;
            padding: 1rem;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 0.9rem;
        }

        .notes-textarea {
            min-height: 120px;
        }

        .markdown-preview {
            min-height: 400px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            padding: 1rem;
            overflow: auto;
        }

        .markdown-preview h1,
        .markdown-preview h2,
        .markdown-preview h3 {
            margin-top: 0;
            color: var(--text-primary);
        }

        .markdown-preview p,
        .markdown-preview li {
            color: var(--text-secondary);
        }

        .markdown-preview code {
            padding: 0.12rem 0.35rem;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.06);
        }

        .markdown-preview pre {
            padding: 0.9rem;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            overflow-x: auto;
        }

        .markdown-preview blockquote {
            margin: 0;
            padding-left: 1rem;
            border-left: 3px solid rgba(168, 85, 247, 0.35);
            color: var(--text-secondary);
        }

        .tag-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
        }

        .tag-option {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.62rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .tag-option input {
            display: none;
        }

        .tag-option.active {
            background: rgba(168, 85, 247, 0.16);
            color: #f1e5ff;
            border-color: rgba(168, 85, 247, 0.28);
        }

        .stage-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .stage-pill {
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            border-radius: 999px;
            padding: 0.6rem 0.9rem;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .stage-pill:hover {
            border-color: rgba(168, 85, 247, 0.45);
            background: rgba(168, 85, 247, 0.12);
            color: var(--text-primary);
        }

        .stage-pill.selected {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.28), rgba(99, 102, 241, 0.22));
            border-color: rgba(168, 85, 247, 0.8);
            color: #f5f3ff;
            font-weight: 700;
            box-shadow: 0 0 0 1px rgba(168, 85, 247, 0.18), 0 10px 24px rgba(76, 29, 149, 0.22);
        }

        .star-rating {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
        }

        .star {
            border: none;
            background: transparent;
            padding: 0.1rem;
            font-size: 1.6rem;
            line-height: 1;
            cursor: pointer;
            color: rgba(148, 163, 184, 0.5);
            transition: transform 0.15s ease, color 0.15s ease, filter 0.15s ease;
        }

        .star:hover {
            transform: scale(1.08);
        }

        .star.filled {
            color: #f5c451;
            filter: drop-shadow(0 0 8px rgba(245, 196, 81, 0.18));
        }

        .star-rating.is-hovering .star {
            color: rgba(148, 163, 184, 0.38);
        }

        .star-rating.is-hovering .star.preview,
        .star-rating .star.filled {
            color: #f5c451;
        }

        .form-hidden-input {
            display: none;
        }

        .subtask-list {
            display: flex;
            flex-direction: column;
            gap: 0.55rem;
        }

        .subtask-row {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            padding: 0.8rem 0.85rem;
            border: 1px solid var(--border);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
        }

        .subtask-row.done .subtask-title-btn {
            text-decoration: line-through;
            color: var(--text-dim);
        }

        .subtask-header {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto auto;
            gap: 0.55rem;
            align-items: center;
        }

        .subtask-check {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .subtask-title-btn,
        .subtask-expand,
        .subtask-delete {
            transition: 0.18s ease;
        }

        .subtask-title-btn {
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-primary);
            text-align: left;
            padding: 0.3rem 0.45rem;
            border-radius: 10px;
            cursor: pointer;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .subtask-expand {
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            border-radius: 10px;
            width: 32px;
            height: 32px;
            cursor: pointer;
        }

        .subtask-delete {
            border: 1px solid rgba(239, 68, 68, 0.24);
            background: transparent;
            color: #fca5a5;
            border-radius: 10px;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        .subtask-detail {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(180px, 0.42fr) minmax(160px, 0.34fr);
            gap: 0.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .subtask-detail-field {
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
            min-width: 0;
        }

        .subtask-detail-field.wide {
            grid-column: 1 / -1;
        }

        .subtask-detail-label {
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
        }

        .subtask-detail-input,
        .subtask-detail-textarea,
        .subtask-detail-select,
        .subtask-detail-date {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            color: var(--text-primary);
            border-radius: 12px;
            outline: none;
            transition: 0.18s ease;
        }

        .subtask-detail-input,
        .subtask-detail-select,
        .subtask-detail-date {
            padding: 0.65rem 0.75rem;
        }

        .subtask-detail-textarea {
            min-height: 92px;
            padding: 0.75rem;
            resize: vertical;
        }

        .subtask-detail-input:focus,
        .subtask-detail-textarea:focus,
        .subtask-detail-select:focus,
        .subtask-detail-date:focus {
            border-color: rgba(168, 85, 247, 0.65);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.14);
        }

        .subtask-add {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }

        .detail-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 1rem;
        }

        .empty-note {
            color: var(--text-dim);
            font-size: 0.88rem;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        @media (max-width: 1080px) {
            .modal-body {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 820px) {
            .board-header,
            .board-viewport {
                padding-left: 1rem;
                padding-right: 1rem;
            }

            .page-header {
                flex-direction: column;
                align-items: stretch;
            }

            .editor-meta-grid {
                grid-template-columns: 1fr;
            }

            .board-columns {
                grid-auto-columns: minmax(84vw, 280px);
            }
        }

        @media (max-width: 640px) {
            .board-shell {
                height: auto;
                min-height: calc(100vh - 50px);
            }

            .editor-shell {
                grid-template-columns: 1fr;
            }

            .modal-header,
            .modal-body,
            .modal-footer {
                padding-left: 0.9rem;
                padding-right: 0.9rem;
            }

            .subtask-detail {
                grid-template-columns: 1fr;
            }

            .subtask-header {
                grid-template-columns: auto minmax(0, 1fr) auto auto;
            }
        }
    </style>
</head>
<body>
    <div id="shared-header"></div>

    <div class="board-shell">
        <section class="board-header">
            <div class="page-header">
                <h1 class="page-title">Projects Board</h1>
                <div class="sync-status" id="sync-status">● Loading board…</div>
            </div>

            <div class="filter-bar">
                <div class="filter-group">
                    <span class="filter-label">Tag</span>
                    <select class="filter-select" id="tag-filter">
                        <option value="all">All tags</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span class="filter-label">Assignee</span>
                    <select class="filter-select" id="assignee-filter">
                        <option value="all">All assignees</option>
                    </select>
                </div>
                <div class="filter-group">
                    <span class="filter-label">Stage</span>
                    <select class="filter-select" id="stage-filter">
                        <option value="all">All stages</option>
                    </select>
                </div>
                <button class="action-btn" id="clear-filters" type="button">Clear Filters</button>
                <button class="action-btn primary" id="add-card-top" type="button">New Card</button>
            </div>
        </section>

        <section class="board-viewport">
            <div class="board-columns" id="board-columns"></div>
        </section>
    </div>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-header">
                <div class="modal-title-wrap">
                    <h2 class="modal-title" id="modal-title">Project Card</h2>
                    <p class="modal-subtitle" id="modal-subtitle">Edit status, stage, markdown notes, subtasks, assignment, and linked items.</p>
                    <div class="modal-header-meta" id="modal-header-meta"></div>
                </div>
                <button class="modal-close" id="modal-close" type="button" aria-label="Close">×</button>
            </div>

            <div class="modal-body">
                <section class="panel">
                    <div class="editor-meta-grid">
                        <div class="modal-field">
                            <label for="detail-title">Title</label>
                            <input class="modal-input" id="detail-title" type="text" placeholder="Card title">
                        </div>
                        <div class="modal-field">
                            <label for="detail-summary">Summary</label>
                            <input class="modal-input" id="detail-summary" type="text" placeholder="Short preview for the board">
                        </div>
                        <div class="modal-field">
                            <label for="detail-status">Status</label>
                            <select class="modal-select" id="detail-status"></select>
                        </div>
                        <div class="modal-field">
                            <label>Priority</label>
                            <div class="star-rating" id="detail-priority-rating" aria-label="Priority rating">
                                <button type="button" class="star" data-value="1" aria-label="1 star">★</button>
                                <button type="button" class="star" data-value="2" aria-label="2 stars">★</button>
                                <button type="button" class="star" data-value="3" aria-label="3 stars">★</button>
                                <button type="button" class="star" data-value="4" aria-label="4 stars">★</button>
                                <button type="button" class="star" data-value="5" aria-label="5 stars">★</button>
                            </div>
                            <input type="hidden" id="detail-priority" class="form-hidden-input" value="3">
                        </div>
                    </div>

                    <div class="modal-field" style="margin-bottom: 1rem;">
                        <label>Stage</label>
                        <div class="stage-selector" id="detail-stage-selector">
                            <button type="button" class="stage-pill" data-value="idea">💡 Idea</button>
                            <button type="button" class="stage-pill" data-value="research">🔬 Research</button>
                            <button type="button" class="stage-pill" data-value="brainstorm">📢 Brainstorm</button>
                            <button type="button" class="stage-pill" data-value="tasks">📋 Tasks</button>
                            <button type="button" class="stage-pill" data-value="building">🔨 Building</button>
                            <button type="button" class="stage-pill" data-value="saved">📦 Saved</button>
                            <button type="button" class="stage-pill" data-value="active">🚀 Active</button>
                        </div>
                        <input type="hidden" id="detail-stage" class="form-hidden-input" value="idea">
                    </div>

                    <div class="modal-field" style="margin-bottom: 1rem;">
                        <label>Tags</label>
                        <div class="tag-palette" id="tag-palette"></div>
                    </div>

                    <div class="editor-toolbar">
                        <h3 class="panel-title" style="margin: 0;">Markdown Body</h3>
                        <div class="editor-tabs">
                            <button class="editor-tab active" data-editor-mode="split" type="button">Split</button>
                            <button class="editor-tab" data-editor-mode="write" type="button">Write</button>
                            <button class="editor-tab" data-editor-mode="preview" type="button">Preview</button>
                        </div>
                    </div>

                    <div class="editor-shell" id="editor-shell">
                        <div class="editor-pane write-pane">
                            <label class="sr-only" for="detail-body">Markdown body</label>
                            <textarea class="editor-textarea" id="detail-body" placeholder="Write notes, findings, or task details in markdown..."></textarea>
                        </div>
                        <div class="editor-pane preview-pane">
                            <div class="markdown-preview" id="markdown-preview"></div>
                        </div>
                    </div>
                </section>

                <aside class="panel">
                    <h3 class="panel-title">Workflow Details</h3>

                    <div class="modal-field" style="margin-bottom: 0.9rem;">
                        <label for="detail-assignee">Assignment</label>
                        <select class="modal-select" id="detail-assignee"></select>
                    </div>

                    <div class="modal-field" style="margin-bottom: 1rem;">
                        <label for="detail-notes">Notes</label>
                        <textarea class="notes-textarea" id="detail-notes" placeholder="Additional notes"></textarea>
                    </div>

                    <div class="modal-field" style="margin-bottom: 1rem;">
                        <label>Subtasks</label>
                        <div class="subtask-list" id="subtask-list"></div>
                        <div class="subtask-add">
                            <input class="subtask-input" id="new-subtask-text" type="text" placeholder="Add subtask">
                            <button class="action-btn" id="add-subtask" type="button">Add</button>
                        </div>
                    </div>

                    <div class="linked-section">
                        <div class="linked-section-header">
                            <div>
                                <div class="linked-section-title">Linked Items</div>
                                <div class="linked-section-meta" id="linked-items-meta">0 linked items</div>
                            </div>
                            <div class="linked-section-actions">
                                <button type="button" class="link-add-btn" id="link-add-btn">Link to...</button>
                            </div>
                        </div>
                        <div id="linked-items-wrap"></div>
                        <div id="reverse-links-wrap"></div>
                    </div>

                    <div class="detail-actions" style="margin-top: 1.25rem;">
                        <button class="action-btn danger" id="delete-btn" type="button">Delete</button>
                    </div>
                </aside>
            </div>

            <div class="modal-footer">
                <button class="action-btn primary" id="save-btn" type="button">Save</button>
            </div>
        </div>
    </div>

    <script src="link-picker.js"></script>
    <script>
        const STAGES = [
            { id: 'idea', label: 'Idea', emoji: '💡' },
            { id: 'research', label: 'Research', emoji: '🔬' },
            { id: 'brainstorm', label: 'Brainstorm', emoji: '📢' },
            { id: 'tasks', label: 'Tasks', emoji: '📋' },
            { id: 'building', label: 'Building', emoji: '🔨' },
            { id: 'saved', label: 'Saved', emoji: '📦' },
            { id: 'active', label: 'Active', emoji: '🚀' }
        ];

        const STATUS_COLUMNS = [
            { id: 'planned', label: 'Planned', emoji: '📋', defaultStage: 'idea' },
            { id: 'active', label: 'Active', emoji: '🔥', defaultStage: 'active' },
            { id: 'paused', label: 'Paused', emoji: '⏸️', defaultStage: 'saved' },
            { id: 'completed', label: 'Completed', emoji: '✅', defaultStage: 'saved' }
        ];

        const DEFAULT_CATEGORIES = {
            project: { label: 'Project', emoji: '🚀', color: '#3b82f6' },
            capability: { label: 'Capability', emoji: '⚡', color: '#a855f7' },
            habit: { label: 'Habit', emoji: '🔄', color: '#22c55e' },
            learning: { label: 'Learning', emoji: '📚', color: '#f59e0b' }
        };

        const DEFAULT_STATUSES = {
            planned: { label: 'Planned', emoji: '📋', color: '#64748b' },
            active: { label: 'Active', emoji: '🔥', color: '#f59e0b' },
            paused: { label: 'Paused', emoji: '⏸️', color: '#94a3b8' },
            completed: { label: 'Completed', emoji: '✅', color: '#22c55e' }
        };

        const TAG_OPTIONS = ['AAD', 'Dashboard', 'Shoots', 'Quinn', 'Research', 'Findings', 'Photography', 'Content', 'Ops', 'Client', 'Automation'];
        const ASSIGNEES = {
            Quinn: { emoji: '🔮', className: 'assignee-quinn' },
            Forge: { emoji: '⚒️', className: 'assignee-forge' },
            Scout: { emoji: '🧭', className: 'assignee-scout' },
            Designer: { emoji: '🎨', className: 'assignee-designer' },
            Adam: { emoji: '🧑‍💻', className: 'assignee-adam' },
            Unassigned: { emoji: '•', className: 'assignee-unassigned' }
        };

        const state = {
            data: { goals: [], categories: { ...DEFAULT_CATEGORIES }, statuses: { ...DEFAULT_STATUSES } },
            filters: { tag: 'all', assignee: 'all', stage: 'all' },
            activeCardId: null,
            editorMode: 'split',
            saveTimer: null,
            dragCardId: null,
            expandedSubtasks: new Set()
        };

        const els = {};

        function uid(prefix) {
            return prefix + '-' + Math.random().toString(36).slice(2, 10);
        }

        function goalSlug(title) {
            const slug = String(title || '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '')
                .slice(0, 40);
            return slug || uid('goal');
        }

        function todayString() {
            return new Date().toISOString().slice(0, 10);
        }

        function stageById(id) {
            return STAGES.find((stage) => stage.id === id) || STAGES[0];
        }

        function statusById(id) {
            return STATUS_COLUMNS.find((status) => status.id === id) || STATUS_COLUMNS[0];
        }

        function assigneeNames() {
            return Object.keys(ASSIGNEES);
        }

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function stripMarkdown(value) {
            return String(value || '')
                .replace(/```[\s\S]*?```/g, ' ')
                .replace(/`([^`]+)`/g, '$1')
                .replace(/!\[[^\]]*\]\([^)]+\)/g, ' ')
                .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                .replace(/[*_>#-]/g, ' ')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function normalizeStatus(value, stage) {
            const normalized = String(value || '').toLowerCase();
            if (STATUS_COLUMNS.some((entry) => entry.id === normalized)) return normalized;
            const fallback = {
                active: 'active',
                building: 'active',
                saved: 'paused'
            };
            return fallback[String(stage || '').toLowerCase()] || 'planned';
        }

        function normalizeStage(value, status) {
            const normalized = String(value || '').toLowerCase();
            if (STAGES.some((entry) => entry.id === normalized)) return normalized;
            return statusById(status).defaultStage;
        }

        function normalizePriority(value) {
            const legacyMap = { high: 1, medium: 3, low: 5 };
            const numeric = legacyMap[String(value || '').toLowerCase()] || Number(value);
            return Math.min(5, Math.max(1, Number.isFinite(numeric) ? numeric : 3));
        }

        function normalizeGoalId(value) {
            return window.LinkedItems.ensureTypedId(value || '', 'goal') || ('goal:' + uid('item'));
        }

        function summaryForGoal(item) {
            if (item.summary && item.summary.trim()) return item.summary.trim();
            if (item.description && item.description.trim()) return stripMarkdown(item.description).slice(0, 140);
            return 'Click to add details.';
        }

        function doneSubtasks(item) {
            return (item.subtasks || []).filter((subtask) => subtask.done).length;
        }

        function totalSubtasks(item) {
            return (item.subtasks || []).length;
        }

        function updateSyncStatus(message, tone) {
            els.syncStatus.textContent = '● ' + message;
            els.syncStatus.style.color = tone === 'error'
                ? '#fecaca'
                : tone === 'saving'
                    ? '#fde68a'
                    : tone === 'success'
                        ? '#bbf7d0'
                        : 'var(--text-secondary)';
        }

        function markSaveQueued() {
            updateSyncStatus('Changes queued…', 'saving');
        }

        function queueSave() {
            markSaveQueued();
            window.clearTimeout(state.saveTimer);
            state.saveTimer = window.setTimeout(() => {
                persistGoals();
            }, 500);
        }

        function clonePayloadForSave() {
            return {
                goals: state.data.goals.map((goal) => ({
                    id: goal.id,
                    title: goal.title,
                    status: goal.status,
                    stage: goal.stage,
                    priority: goal.priority,
                    category: goal.category,
                    description: goal.description,
                    summary: goal.summary,
                    subtasks: goal.subtasks,
                    assignee: goal.assignee,
                    linkedItems: goal.linkedItems,
                    created: goal.created,
                    updated: goal.updated,
                    notes: goal.notes,
                    tags: goal.tags,
                    order: goal.order,
                    queuedAgent: goal.queuedAgent || '',
                    queuedAt: goal.queuedAt || ''
                })),
                categories: state.data.categories,
                statuses: state.data.statuses
            };
        }

        async function persistGoals() {
            const payload = clonePayloadForSave();
            localStorage.setItem('projects-board-data', JSON.stringify(payload));
            updateSyncStatus('Saving board…', 'saving');

            try {
                const response = await fetch('/api/goals', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: payload })
                });

                if (!response.ok) {
                    throw new Error('POST /api/goals failed');
                }

                window.LinkedItems.invalidateCache();
                updateSyncStatus('Board saved', 'success');
            } catch (error) {
                updateSyncStatus('API unavailable, saved locally', 'error');
            }
        }

        function normalizeSubtask(subtask, assignee, index) {
            return {
                id: subtask.id || uid('subtask-' + index),
                text: subtask.text || '',
                done: Boolean(subtask.done),
                body: subtask.body || '',
                assignee: subtask.assignee || '',
                dueDate: subtask.dueDate || ''
            };
        }

        function legacyStageToStage(value) {
            const mapping = {
                idea: 'idea',
                research: 'research',
                findings: 'brainstorm',
                task: 'tasks',
                'in-progress': 'building',
                done: 'saved'
            };
            return mapping[String(value || '').toLowerCase()] || 'idea';
        }

        function legacyStageToStatus(value) {
            const mapping = {
                idea: 'planned',
                research: 'planned',
                findings: 'planned',
                task: 'planned',
                'in-progress': 'active',
                done: 'completed'
            };
            return mapping[String(value || '').toLowerCase()] || 'planned';
        }

        function normalizeGoal(goal, index) {
            const legacyRelated = Array.isArray(goal.relatedItemIds)
                ? goal.relatedItemIds.map((id) => window.LinkedItems.ensureTypedId(id, 'goal'))
                : [];
            const linkedItems = window.LinkedItems.normalizeLinkedItems([...(goal.linkedItems || []), ...legacyRelated]);
            const status = normalizeStatus(goal.status, goal.stage);
            const stage = normalizeStage(goal.stage, status);

            return {
                id: normalizeGoalId(goal.id),
                title: goal.title || 'Untitled',
                status,
                stage,
                priority: normalizePriority(goal.priority),
                category: goal.category || 'project',
                description: goal.description || goal.body || '',
                summary: goal.summary || '',
                subtasks: Array.isArray(goal.subtasks) ? goal.subtasks.map((subtask, subtaskIndex) => normalizeSubtask(subtask, goal.assignee, subtaskIndex)) : [],
                assignee: ASSIGNEES[goal.assignee] ? goal.assignee : 'Unassigned',
                linkedItems,
                created: goal.created || goal.createdAt || todayString(),
                updated: goal.updated || goal.updatedAt || todayString(),
                notes: goal.notes || '',
                tags: Array.isArray(goal.tags) ? goal.tags : [],
                order: Number.isFinite(goal.order) ? goal.order : index,
                queuedAgent: goal.queuedAgent || '',
                queuedAt: goal.queuedAt || ''
            };
        }

        function normalizePayload(raw) {
            if (raw && Array.isArray(raw.goals)) {
                return {
                    goals: raw.goals.map((goal, index) => normalizeGoal(goal, index)),
                    categories: raw.categories && typeof raw.categories === 'object' ? raw.categories : { ...DEFAULT_CATEGORIES },
                    statuses: raw.statuses && typeof raw.statuses === 'object' ? raw.statuses : { ...DEFAULT_STATUSES }
                };
            }

            const legacyItems = raw && Array.isArray(raw.items) ? raw.items : [];
            return {
                goals: legacyItems.map((item, index) => normalizeGoal({
                    id: item.id,
                    title: item.title,
                    status: legacyStageToStatus(item.stage),
                    stage: legacyStageToStage(item.stage),
                    priority: item.priority,
                    category: 'project',
                    description: item.body || '',
                    summary: item.summary || '',
                    subtasks: item.subtasks || [],
                    assignee: item.assignee,
                    linkedItems: item.linkedItems || [],
                    relatedItemIds: item.relatedItemIds || [],
                    created: item.createdAt || todayString(),
                    updated: item.updatedAt || todayString(),
                    tags: item.tags || [],
                    order: item.order,
                    queuedAgent: item.queuedAgent || '',
                    queuedAt: item.queuedAt || '',
                    notes: ''
                }, index)),
                categories: { ...DEFAULT_CATEGORIES },
                statuses: { ...DEFAULT_STATUSES }
            };
        }

        async function loadGoals() {
            updateSyncStatus('Loading board…');

            try {
                const response = await fetch('data/goals.json', { cache: 'no-store' });
                if (!response.ok) throw new Error('GET data/goals.json failed');
                const data = await response.json();
                state.data = normalizePayload(data);
                localStorage.setItem('projects-board-data', JSON.stringify(clonePayloadForSave()));
                updateSyncStatus('Goals loaded', 'success');
                return;
            } catch (error) {
                // continue fallback chain
            }

            try {
                const local = localStorage.getItem('projects-board-data');
                if (local) {
                    state.data = normalizePayload(JSON.parse(local));
                    updateSyncStatus('Loaded local goals cache', 'success');
                    return;
                }
            } catch (error) {
                // ignore local parse errors
            }

            state.data = normalizePayload({ goals: [], categories: DEFAULT_CATEGORIES, statuses: DEFAULT_STATUSES });
            updateSyncStatus('Started with empty board', 'error');
        }

        function filteredItems() {
            return state.data.goals.filter((item) => {
                const tagMatch = state.filters.tag === 'all' || (item.tags || []).includes(state.filters.tag);
                const assigneeMatch = state.filters.assignee === 'all' || (item.assignee || 'Unassigned') === state.filters.assignee;
                const stageMatch = state.filters.stage === 'all' || item.stage === state.filters.stage;
                return tagMatch && assigneeMatch && stageMatch;
            });
        }

        function itemsForStatus(statusId) {
            return filteredItems()
                .filter((item) => item.status === statusId)
                .sort((a, b) => (a.order ?? 0) - (b.order ?? 0) || a.title.localeCompare(b.title));
        }

        function populateAssigneeSelects() {
            const options = assigneeNames().map((name) => {
                const meta = ASSIGNEES[name];
                return '<option value="' + escapeHtml(name) + '">' + meta.emoji + ' ' + escapeHtml(name) + '</option>';
            }).join('');

            els.detailAssignee.innerHTML = options;
            els.assigneeFilter.innerHTML = '<option value="all">All assignees</option>' +
                assigneeNames().map((name) => '<option value="' + escapeHtml(name) + '">' + escapeHtml(name) + '</option>').join('');
        }

        function populateFilters() {
            const tags = new Set();
            state.data.goals.forEach((item) => (item.tags || []).forEach((tag) => tags.add(tag)));
            const currentTag = state.filters.tag;

            els.tagFilter.innerHTML = '<option value="all">All tags</option>' +
                Array.from(tags).sort().map((tag) => '<option value="' + escapeHtml(tag) + '">' + escapeHtml(tag) + '</option>').join('');
            els.tagFilter.value = Array.from(tags).includes(currentTag) ? currentTag : 'all';
            els.assigneeFilter.value = assigneeNames().includes(state.filters.assignee) ? state.filters.assignee : 'all';
            els.stageFilter.innerHTML = '<option value="all">All stages</option>' +
                STAGES.map((stage) => '<option value="' + stage.id + '">' + stage.emoji + ' ' + stage.label + '</option>').join('');
            els.stageFilter.value = STAGES.some((stage) => stage.id === state.filters.stage) ? state.filters.stage : 'all';
        }

        function renderPriorityStars(priority) {
            const count = normalizePriority(priority);
            return '<span class="priority-stars" aria-label="Priority ' + count + '">' + '★'.repeat(count) + '☆'.repeat(5 - count) + '</span>';
        }

        function renderBoard() {
            populateFilters();

            els.boardColumns.innerHTML = STATUS_COLUMNS.map((status) => {
                const items = itemsForStatus(status.id);
                const cardsHtml = items.length
                    ? items.map((item) => renderCard(item)).join('')
                    : '<div class="column-empty">No cards in ' + status.label + '.</div>';

                return '' +
                    '<section class="column" data-status-id="' + status.id + '">' +
                        '<div class="column-header">' +
                            '<div class="column-topline">' +
                                '<div class="column-title"><span>' + status.emoji + '</span><span>' + status.label + '</span></div>' +
                                '<div style="display:flex; align-items:center; gap:0.55rem;">' +
                                    '<span class="column-count">' + items.length + '</span>' +
                                    '<button class="quick-add-trigger" type="button" data-quick-add-open="' + status.id + '">+</button>' +
                                '</div>' +
                            '</div>' +
                            '<div class="quick-add" id="quick-add-' + status.id + '">' +
                                '<input class="quick-add-input" type="text" placeholder="New ' + status.label + ' card" data-quick-add-input="' + status.id + '">' +
                                '<div class="quick-add-actions">' +
                                    '<button class="action-btn" type="button" data-quick-add-save="' + status.id + '">Add</button>' +
                                    '<button class="action-btn" type="button" data-quick-add-cancel="' + status.id + '">×</button>' +
                                '</div>' +
                            '</div>' +
                        '</div>' +
                        '<div class="card-list" data-card-list="' + status.id + '">' + cardsHtml + '</div>' +
                    '</section>';
            }).join('');

            bindBoardInteractions();
        }

        function renderCard(item) {
            const done = doneSubtasks(item);
            const total = totalSubtasks(item);
            const assignee = ASSIGNEES[item.assignee] || ASSIGNEES.Unassigned;
            const stage = stageById(item.stage);
            const summary = escapeHtml(summaryForGoal(item));
            const tags = (item.tags || []).slice(0, 3).map((tag) => '<span class="chip tag">' + escapeHtml(tag) + '</span>').join('');
            const progressPercent = total ? Math.round((done / total) * 100) : 0;
            const linkedCount = item.linkedItems.length ? '<span class="chip">🔗 ' + item.linkedItems.length + '</span>' : '';

            return '' +
                '<article class="card" draggable="true" data-card-id="' + item.id + '">' +
                    '<div class="card-header">' +
                        '<h3 class="card-title">' + escapeHtml(item.title) + '</h3>' +
                        renderPriorityStars(item.priority) +
                    '</div>' +
                    '<p class="card-summary">' + summary + '</p>' +
                    '<div class="card-meta">' +
                        '<span class="chip stage">' + stage.emoji + ' ' + escapeHtml(stage.label) + '</span>' +
                        tags +
                        linkedCount +
                        '<span class="chip assignee ' + assignee.className + '">' + assignee.emoji + ' ' + escapeHtml(item.assignee) + '</span>' +
                    '</div>' +
                    '<div class="progress-row">' +
                        '<div class="progress-bar"><div class="progress-fill" style="width:' + progressPercent + '%;"></div></div>' +
                        '<span class="progress-label">' + done + '/' + total + ' done</span>' +
                    '</div>' +
                '</article>';
        }

        function bindBoardInteractions() {
            els.boardColumns.querySelectorAll('[data-quick-add-open]').forEach((button) => {
                button.addEventListener('click', () => toggleQuickAdd(button.dataset.quickAddOpen, true));
            });

            els.boardColumns.querySelectorAll('[data-quick-add-cancel]').forEach((button) => {
                button.addEventListener('click', () => toggleQuickAdd(button.dataset.quickAddCancel, false));
            });

            els.boardColumns.querySelectorAll('[data-quick-add-save]').forEach((button) => {
                button.addEventListener('click', () => createQuickCard(button.dataset.quickAddSave));
            });

            els.boardColumns.querySelectorAll('[data-quick-add-input]').forEach((input) => {
                input.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter') {
                        event.preventDefault();
                        createQuickCard(input.dataset.quickAddInput);
                    }
                    if (event.key === 'Escape') {
                        toggleQuickAdd(input.dataset.quickAddInput, false);
                    }
                });
            });

            els.boardColumns.querySelectorAll('.card').forEach((card) => {
                card.addEventListener('click', (event) => {
                    if (event.target.closest('button, input, select, textarea')) return;
                    openCard(card.dataset.cardId);
                });

                card.addEventListener('dragstart', () => {
                    state.dragCardId = card.dataset.cardId;
                    card.classList.add('dragging');
                });

                card.addEventListener('dragend', () => {
                    state.dragCardId = null;
                    card.classList.remove('dragging');
                    els.boardColumns.querySelectorAll('.column').forEach((column) => column.classList.remove('drag-target'));
                });
            });

            els.boardColumns.querySelectorAll('.column').forEach((column) => {
                column.addEventListener('dragover', (event) => {
                    event.preventDefault();
                    column.classList.add('drag-target');
                });

                column.addEventListener('dragleave', () => {
                    column.classList.remove('drag-target');
                });

                column.addEventListener('drop', (event) => {
                    event.preventDefault();
                    column.classList.remove('drag-target');
                    if (!state.dragCardId) return;
                    moveCardToStatus(state.dragCardId, column.dataset.statusId);
                });
            });
        }

        function toggleQuickAdd(statusId, active) {
            const wrap = document.getElementById('quick-add-' + statusId);
            if (!wrap) return;
            wrap.classList.toggle('active', active);
            if (active) {
                const input = wrap.querySelector('input');
                input.value = '';
                input.focus();
            }
        }

        function nextStatusOrder(statusId) {
            const stageItems = state.data.goals.filter((item) => item.status === statusId);
            return stageItems.length ? Math.max(...stageItems.map((item) => item.order ?? 0)) + 1 : 0;
        }

        function createQuickCard(statusId) {
            const input = els.boardColumns.querySelector('[data-quick-add-input="' + statusId + '"]');
            const title = input.value.trim();
            if (!title) return;

            const item = {
                id: 'goal:' + goalSlug(title),
                title,
                status: statusId,
                stage: statusById(statusId).defaultStage,
                priority: 3,
                category: 'project',
                description: '',
                summary: '',
                subtasks: [],
                assignee: 'Unassigned',
                linkedItems: [],
                created: todayString(),
                updated: todayString(),
                notes: '',
                tags: [],
                order: nextStatusOrder(statusId),
                queuedAgent: '',
                queuedAt: ''
            };

            if (state.data.goals.some((goal) => goal.id === item.id)) {
                item.id = 'goal:' + uid('card');
            }

            state.data.goals.push(item);
            renderBoard();
            toggleQuickAdd(statusId, false);
            queueSave();
            openCard(item.id);
        }

        function moveCardToStatus(cardId, statusId) {
            const item = state.data.goals.find((entry) => entry.id === cardId);
            if (!item || item.status === statusId) return;
            item.status = statusId;
            item.order = nextStatusOrder(statusId);
            item.updated = todayString();
            renderBoard();
            if (state.activeCardId === cardId) {
                renderModalHeaderMeta();
                updateModalSubtitle(item);
            }
            queueSave();
        }

        function activeCard() {
            return state.data.goals.find((item) => item.id === state.activeCardId) || null;
        }

        function renderTagPalette(selectedTags) {
            els.tagPalette.innerHTML = TAG_OPTIONS.map((tag) => {
                const active = selectedTags.includes(tag) ? ' active' : '';
                return '<label class="tag-option' + active + '" data-tag-option="' + tag + '">' +
                    '<input type="checkbox" value="' + escapeHtml(tag) + '"' + (selectedTags.includes(tag) ? ' checked' : '') + '>' +
                    '<span>' + escapeHtml(tag) + '</span>' +
                '</label>';
            }).join('');

            els.tagPalette.querySelectorAll('[data-tag-option]').forEach((label) => {
                label.addEventListener('click', (event) => {
                    event.preventDefault();
                    const checkbox = label.querySelector('input');
                    checkbox.checked = !checkbox.checked;
                    label.classList.toggle('active', checkbox.checked);
                    syncCardFromModal();
                });
            });
        }

        function setStageValue(value) {
            const stage = normalizeStage(value, els.detailStatus.value);
            els.detailStage.value = stage;
            document.querySelectorAll('#detail-stage-selector .stage-pill').forEach((pill) => {
                const selected = pill.dataset.value === stage;
                pill.classList.toggle('selected', selected);
                pill.setAttribute('aria-pressed', String(selected));
            });
        }

        function setPriorityValue(value, previewValue = null) {
            const priority = normalizePriority(value);
            const activeValue = previewValue == null ? null : normalizePriority(previewValue);
            const rating = els.detailPriorityRating;

            els.detailPriority.value = String(priority);
            rating.classList.toggle('is-hovering', activeValue !== null);

            rating.querySelectorAll('.star').forEach((star) => {
                const starValue = Number(star.dataset.value);
                const filled = activeValue !== null ? starValue <= activeValue : starValue <= priority;
                star.classList.toggle('filled', filled);
                star.classList.toggle('preview', activeValue !== null && starValue <= activeValue);
                star.setAttribute('aria-pressed', String(starValue === priority));
            });
        }

        function initDetailControls() {
            document.querySelectorAll('#detail-stage-selector .stage-pill').forEach((pill) => {
                pill.addEventListener('click', () => {
                    setStageValue(pill.dataset.value);
                    syncCardFromModal();
                });
            });

            els.detailPriorityRating.querySelectorAll('.star').forEach((star) => {
                star.addEventListener('mouseenter', () => {
                    setPriorityValue(els.detailPriority.value, star.dataset.value);
                });
                star.addEventListener('click', () => {
                    setPriorityValue(star.dataset.value);
                    syncCardFromModal();
                });
            });

            els.detailPriorityRating.addEventListener('mouseleave', () => {
                setPriorityValue(els.detailPriority.value);
            });
        }

            const item = activeCard();
            if (!item) return;

            if (!item.subtasks.length) {
                els.subtaskList.innerHTML = '<div class="empty-note">No subtasks yet.</div>';
                return;
            }

            const assigneeOptions = (selectedValue) => {
                const names = assigneeNames().filter((name) => name !== 'Unassigned');
                return ['<option value="">Unassigned</option>']
                    .concat(names.map((name) => '<option value="' + escapeHtml(name) + '"' + (selectedValue === name ? ' selected' : '') + '>' + escapeHtml(name) + '</option>'))
                    .join('');
            };

            els.subtaskList.innerHTML = item.subtasks.map((subtask) => {
                const expanded = state.expandedSubtasks.has(subtask.id);
                return '' +
                    '<div class="subtask-row' + (subtask.done ? ' done' : '') + '" data-subtask-id="' + subtask.id + '">' +
                        '<div class="subtask-header">' +
                            '<input class="subtask-check" type="checkbox"' + (subtask.done ? ' checked' : '') + '>' +
                            '<button class="subtask-title-btn" type="button" aria-expanded="' + String(expanded) + '">' + escapeHtml(subtask.text || 'Untitled subtask') + '</button>' +
                            '<button class="subtask-expand" type="button" aria-label="' + (expanded ? 'Collapse subtask details' : 'Expand subtask details') + '">' + (expanded ? '⌃' : '⌄') + '</button>' +
                            '<button class="subtask-delete" type="button" aria-label="Delete subtask">×</button>' +
                        '</div>' +
                        (expanded
                            ? '<div class="subtask-detail">' +
                                '<div class="subtask-detail-field wide">' +
                                    '<label class="subtask-detail-label">Title</label>' +
                                    '<input class="subtask-detail-input" type="text" data-subtask-field="text" value="' + escapeHtml(subtask.text || '') + '" placeholder="Subtask title">' +
                                '</div>' +
                                '<div class="subtask-detail-field wide">' +
                                    '<label class="subtask-detail-label">Description</label>' +
                                    '<textarea class="subtask-detail-textarea" data-subtask-field="body" placeholder="Add description or notes...">' + escapeHtml(subtask.body || '') + '</textarea>' +
                                '</div>' +
                                '<div class="subtask-detail-field">' +
                                    '<label class="subtask-detail-label">Assignee</label>' +
                                    '<select class="subtask-detail-select" data-subtask-field="assignee">' + assigneeOptions(subtask.assignee || '') + '</select>' +
                                '</div>' +
                                '<div class="subtask-detail-field">' +
                                    '<label class="subtask-detail-label">Due Date</label>' +
                                    '<input class="subtask-detail-date" type="date" data-subtask-field="dueDate" value="' + escapeHtml(subtask.dueDate || '') + '">' +
                                '</div>' +
                            '</div>'
                            : '') +
                    '</div>';
            }).join('');

            els.subtaskList.querySelectorAll('.subtask-row').forEach((row) => {
                const subtaskId = row.dataset.subtaskId;
                row.querySelector('.subtask-check').addEventListener('change', (event) => {
                    const card = activeCard();
                    const subtask = card.subtasks.find((entry) => entry.id === subtaskId);
                    if (!subtask) return;
                    subtask.done = event.target.checked;
                    touchCard(card);
                    renderSubtasks();
                    renderBoard();
                    queueSave();
                });

                const toggleExpanded = () => {
                    if (state.expandedSubtasks.has(subtaskId)) {
                        state.expandedSubtasks.delete(subtaskId);
                    } else {
                        state.expandedSubtasks.add(subtaskId);
                    }
                    renderSubtasks();
                };

                row.querySelector('.subtask-title-btn').addEventListener('click', toggleExpanded);
                row.querySelector('.subtask-expand').addEventListener('click', toggleExpanded);

                row.querySelector('.subtask-delete').addEventListener('click', () => {
                    const card = activeCard();
                    card.subtasks = card.subtasks.filter((entry) => entry.id !== subtaskId);
                    state.expandedSubtasks.delete(subtaskId);
                    touchCard(card);
                    renderSubtasks();
                    renderBoard();
                    queueSave();
                });

                row.querySelectorAll('[data-subtask-field]').forEach((field) => {
                    const fieldName = field.dataset.subtaskField;
                    const eventName = field.tagName === 'TEXTAREA' || field.type === 'text' ? 'blur' : 'change';
                    field.addEventListener(eventName, (event) => {
                        const card = activeCard();
                        if (!card) return;
                        const subtask = card.subtasks.find((entry) => entry.id === subtaskId);
                        if (!subtask) return;
                        subtask[fieldName] = event.target.value;
                        touchCard(card);
                        renderSubtasks();
                        renderBoard();
                        queueSave();
                    });
                });
            });
        }

        function buildLinkContext(dataset) {
            const items = [...dataset.items];
            const byId = { ...dataset.byId };
            state.data.goals.forEach((goal) => {
                const normalized = {
                    ...goal,
                    id: goal.id,
                    type: 'goal',
                    title: goal.title,
                    linkedItems: goal.linkedItems,
                    searchText: [goal.title, goal.summary, goal.description, goal.notes, (goal.tags || []).join(' ')].filter(Boolean).join(' ').toLowerCase()
                };
                if (!byId[goal.id]) {
                    items.push(normalized);
                }
                byId[goal.id] = normalized;
            });
            return { items, byId };
        }

            item.summary = els.detailSummary.value.trim();
            item.status = normalizeStatus(els.detailStatus.value, els.detailStage.value);

            item.priority = normalizePriority(els.detailPriority.value);
            item.assignee = els.detailAssignee.value;

        function renderMarkdownPreview(markdown) {
            els.markdownPreview.innerHTML = markdownToHtml(markdown);
        }

        function markdownToHtml(markdown) {
            const escaped = escapeHtml(markdown || '');
            const lines = escaped.split('\n');
            let html = '';
            let inList = false;
            let inCode = false;
            let codeBuffer = [];

            const flushCode = () => {
                if (!inCode) return;
                html += '<pre><code>' + codeBuffer.join('\n') + '</code></pre>';
                inCode = false;
                codeBuffer = [];
            };

            const flushList = () => {
                if (inList) {
                    html += '</ul>';
                    inList = false;
                }
            };

            lines.forEach((line) => {
                if (line.startsWith('```')) {
                    flushList();
                    if (inCode) {
                        flushCode();
                    } else {
                        inCode = true;
                        codeBuffer = [];
                    }
                    return;
                }

                if (inCode) {
                    codeBuffer.push(line);
                    return;
                }

                if (/^\s*-\s+/.test(line)) {
                    if (!inList) {
                        html += '<ul>';
                        inList = true;
                    }
                    html += '<li>' + inlineMarkdown(line.replace(/^\s*-\s+/, '')) + '</li>';
                    return;
                }

                flushList();

                if (!line.trim()) {
                    html += '<p></p>';
                    return;
                }

                if (line.startsWith('### ')) {
                    html += '<h3>' + inlineMarkdown(line.slice(4)) + '</h3>';
                    return;
                }
                if (line.startsWith('## ')) {
                    html += '<h2>' + inlineMarkdown(line.slice(3)) + '</h2>';
                    return;
                }
                if (line.startsWith('# ')) {
                    html += '<h1>' + inlineMarkdown(line.slice(2)) + '</h1>';
                    return;
                }
                if (line.startsWith('> ')) {
                    html += '<blockquote>' + inlineMarkdown(line.slice(2)) + '</blockquote>';
                    return;
                }

                html += '<p>' + inlineMarkdown(line) + '</p>';
            });

            flushList();
            flushCode();
            return html || '<p class="empty-note">Nothing to preview yet.</p>';
        }

        function inlineMarkdown(text) {
            return String(text || '')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g, '<em>$1</em>')
                .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
        }

            syncCardFromModal();
            closeModal();

            ['input', 'change'].forEach((eventName) => {

                });
            });

            els.newSubtaskText.addEventListener('keydown', (event) => {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    addSubtask();
                }

                if (item) openBoardLinkPicker(item.id);

                    state.editorMode = button.dataset.editorMode;

                    els.editorShell.classList.remove('write-only', 'preview-only');
                    if (state.editorMode === 'write') els.editorShell.classList.add('write-only');
                    if (state.editorMode === 'preview') els.editorShell.classList.add('preview-only');

            });

                state.filters.assignee = els.assigneeFilter.value;
                renderBoard();
            });

                state.filters.stage = els.stageFilter.value;
                renderBoard();
            });

        function cacheElements() {
            els.boardColumns = document.getElementById('board-columns');
            els.syncStatus = document.getElementById('sync-status');
            els.tagFilter = document.getElementById('tag-filter');
            els.assigneeFilter = document.getElementById('assignee-filter');
            els.stageFilter = document.getElementById('stage-filter');
            els.clearFilters = document.getElementById('clear-filters');
