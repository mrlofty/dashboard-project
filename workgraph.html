<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Graph — Dashboard</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            padding: 1rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            color: #f3e8ff;
            margin-bottom: 0.5rem;
        }

        .header-meta {
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: rgba(168, 85, 247, 0.5);
        }

        .filter-btn.active {
            background: rgba(168, 85, 247, 0.3);
            border-color: rgba(168, 85, 247, 0.6);
            color: #f3e8ff;
        }

        .tasks-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .task-card {
            background: linear-gradient(135deg, rgba(19, 18, 34, 0.96) 0%, rgba(34, 24, 52, 0.94) 100%);
            border: 1px solid rgba(168, 85, 247, 0.25);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.2s ease;
        }

        .task-card:hover {
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .task-card.has-children {
            cursor: pointer;
        }

        .task-card.child {
            margin-left: 2rem;
            margin-top: 0.75rem;
            border-left: 3px solid rgba(168, 85, 247, 0.4);
        }

        .task-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
        }

        .task-status {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .status-queued { background: rgba(107, 114, 128, 0.2); color: #9ca3af; border: 1px solid rgba(107, 114, 128, 0.4); }
        .status-active { background: rgba(249, 115, 22, 0.2); color: #fb923c; border: 1px solid rgba(249, 115, 22, 0.4); }
        .status-review { background: rgba(234, 179, 8, 0.2); color: #fbbf24; border: 1px solid rgba(234, 179, 8, 0.4); }
        .status-complete { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.4); }
        .status-blocked { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.4); }
        .status-cancelled { background: rgba(107, 114, 128, 0.15); color: #6b7280; border: 1px solid rgba(107, 114, 128, 0.3); text-decoration: line-through; }

        .task-title {
            flex: 1;
            font-size: 1.05rem;
            font-weight: 600;
            color: #f3e8ff;
        }

        .task-expand {
            color: #a0a0a0;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .task-meta {
            display: flex;
            gap: 1.5rem;
            font-size: 0.8rem;
            color: #a0a0a0;
            flex-wrap: wrap;
            margin-bottom: 0.5rem;
        }

        .task-meta-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .task-delegation {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            font-size: 0.85rem;
            color: #c0c0d0;
        }

        .task-delegation-arrow {
            color: #a855f7;
        }

        .task-notes {
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.25);
            border-left: 3px solid rgba(168, 85, 247, 0.4);
            border-radius: 6px;
            font-size: 0.85rem;
            color: #d0d0e0;
        }

        .task-tags {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            flex-wrap: wrap;
        }

        .task-tag {
            padding: 0.25rem 0.6rem;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 999px;
            font-size: 0.7rem;
            color: #c084fc;
        }

        .task-children {
            display: none;
        }

        .task-card.expanded .task-children {
            display: block;
        }

        .task-card.expanded .task-expand::before {
            content: '▲';
        }

        .task-expand::before {
            content: '▼';
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #a0a0a0;
            font-size: 1rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #a855f7;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #c084fc;
        }

        @media (max-width: 768px) {
            .task-meta {
                flex-direction: column;
                gap: 0.35rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .task-card.child {
                margin-left: 1rem;
            }
        }
    </style>
</head>
<body>
    <div id="shared-header"></div>
    <div class="container">
        
        <header>
            <h1>🌳 Work Graph</h1>
            <div class="header-meta" id="task-count">Loading...</div>
        </header>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="review">Review</button>
            <button class="filter-btn" data-filter="complete">Complete</button>
            <button class="filter-btn" data-filter="blocked">Blocked</button>
        </div>

        <div class="tasks-list" id="tasks-list">
            <div class="empty-state">Loading tasks...</div>
        </div>
    </div>

    <script>
        const AGENT_EMOJI = {
            quinn: '🔮',
            forge: '⚒️',
            scout: '🔍',
            adam: '🧑💻',
            frontend: '🎨',
            revenue: '💰'
        };

        let allTasks = [];
        let currentFilter = 'all';
        let tasksById = {};

        async function fetchTasks() {
            const candidates = [
                `/api/workgraph?t=${Date.now()}`,
                `data/workgraph.json?t=${Date.now()}`,
                `./data/workgraph.json?t=${Date.now()}`
            ];

            for (const url of candidates) {
                try {
                    const response = await fetch(url, { cache: 'no-store' });
                    if (!response.ok) continue;
                    const payload = await response.json();
                    if (payload && Array.isArray(payload.tasks)) {
                        return payload.tasks;
                    }
                } catch (error) {
                    // Try next candidate
                }
            }

            return [];
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTimestamp(isoString) {
            if (!isoString) return 'Unknown';
            const date = new Date(isoString);
            return date.toLocaleDateString('en-AU', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function getStatusClass(status) {
            return `status-${(status || 'queued').toLowerCase()}`;
        }

        function renderTaskCard(task, isChild = false) {
            const statusClass = getStatusClass(task.status);
            const assignee = task.assignee || 'unknown';
            const assigneeEmoji = AGENT_EMOJI[assignee] || '🤖';
            const assigneeLabel = assignee.charAt(0).toUpperCase() + assignee.slice(1);
            
            const delegatedBy = task.delegatedBy || '';
            const delegatedByEmoji = AGENT_EMOJI[delegatedBy] || '';
            const delegatedByLabel = delegatedBy ? delegatedBy.charAt(0).toUpperCase() + delegatedBy.slice(1) : '';
            
            const requestedBy = task.requestedBy || '';
            const requestedByEmoji = AGENT_EMOJI[requestedBy] || '';
            const requestedByLabel = requestedBy ? requestedBy.charAt(0).toUpperCase() + requestedBy.slice(1) : '';

            const hasChildren = task.children && task.children.length > 0;
            const createdTime = formatTimestamp(task.created);
            const updatedTime = formatTimestamp(task.updated);
            const completedTime = task.completed ? formatTimestamp(task.completed) : null;

            const tagsHtml = (task.tags || []).map(tag => 
                `<span class="task-tag">${escapeHtml(tag)}</span>`
            ).join('');

            const notesHtml = task.notes ? `<div class="task-notes">📝 ${escapeHtml(task.notes)}</div>` : '';

            const delegationHtml = delegatedBy ? `
                <div class="task-delegation">
                    ${requestedByEmoji ? `<span>${requestedByEmoji} ${escapeHtml(requestedByLabel)}</span> <span class="task-delegation-arrow">→</span>` : ''}
                    <span>${delegatedByEmoji} ${escapeHtml(delegatedByLabel)}</span>
                    <span class="task-delegation-arrow">→</span>
                    <span>${assigneeEmoji} ${escapeHtml(assigneeLabel)}</span>
                </div>
            ` : `<div class="task-delegation"><span>${assigneeEmoji} ${escapeHtml(assigneeLabel)}</span></div>`;

            let childrenHtml = '';
            if (hasChildren) {
                childrenHtml = '<div class="task-children">';
                task.children.forEach(childId => {
                    const child = tasksById[childId];
                    if (child) {
                        childrenHtml += renderTaskCard(child, true);
                    }
                });
                childrenHtml += '</div>';
            }

            return `
                <div class="task-card ${hasChildren ? 'has-children' : ''} ${isChild ? 'child' : ''}" 
                     data-task-id="${task.id}" 
                     data-status="${(task.status || '').toLowerCase()}"
                     ${hasChildren ? 'onclick="toggleTask(\'' + task.id + '\')"' : ''}>
                    <div class="task-header">
                        <span class="task-status ${statusClass}">${escapeHtml(task.status || 'Queued')}</span>
                        <div class="task-title">${escapeHtml(task.title || 'Untitled Task')}</div>
                        ${hasChildren ? '<span class="task-expand"></span>' : ''}
                    </div>
                    <div class="task-meta">
                        <span class="task-meta-item">🆔 ${escapeHtml(task.id)}</span>
                        <span class="task-meta-item">📅 Created ${createdTime}</span>
                        <span class="task-meta-item">🔄 Updated ${updatedTime}</span>
                        ${completedTime ? `<span class="task-meta-item">✅ Completed ${completedTime}</span>` : ''}
                    </div>
                    ${delegationHtml}
                    ${notesHtml}
                    ${tagsHtml ? `<div class="task-tags">${tagsHtml}</div>` : ''}
                    ${childrenHtml}
                </div>
            `;
        }

        function toggleTask(taskId) {
            const card = document.querySelector(`[data-task-id="${taskId}"]`);
            if (card) {
                card.classList.toggle('expanded');
            }
        }

        function renderTasks() {
            let filtered = allTasks.filter(t => !t.parentId || t.parentId === null);

            // Apply status filter
            if (currentFilter !== 'all') {
                filtered = filtered.filter(t => (t.status || '').toLowerCase() === currentFilter);
            }

            const listEl = document.getElementById('tasks-list');
            const countEl = document.getElementById('task-count');

            if (filtered.length === 0) {
                listEl.innerHTML = '<div class="empty-state">No tasks found</div>';
                countEl.textContent = allTasks.length === 0 ? 'No tasks yet' : `${filtered.length} of ${allTasks.length} tasks`;
                return;
            }

            // Sort by created desc
            filtered.sort((a, b) => new Date(b.created || 0) - new Date(a.created || 0));

            listEl.innerHTML = filtered.map(t => renderTaskCard(t)).join('');
            
            const active = allTasks.filter(t => ['active', 'review'].includes((t.status || '').toLowerCase())).length;
            const complete = allTasks.filter(t => t.status === 'complete').length;
            countEl.textContent = `${filtered.length} tasks • ${active} active • ${complete} complete`;
        }

        async function loadTasks() {
            allTasks = await fetchTasks();
            tasksById = {};
            allTasks.forEach(t => tasksById[t.id] = t);
            renderTasks();
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderTasks();
            });
        });

        // SSE for live updates
        function initSSE() {
            const sseUrls = ['/api/events', '/events', '/sse'];
            let eventSource = null;

            for (const url of sseUrls) {
                try {
                    eventSource = new EventSource(url);
                    
                    eventSource.addEventListener('workgraph', () => {
                        console.log('Work graph updated, refreshing...');
                        loadTasks();
                    });

                    eventSource.addEventListener('collaboration', () => {
                        console.log('Collaboration event, refreshing work graph...');
                        loadTasks();
                    });

                    eventSource.onerror = () => {
                        console.log('SSE error, will retry...');
                    };

                    break; // Successfully connected
                } catch (error) {
                    console.log(`SSE failed for ${url}, trying next...`);
                }
            }
        }

        // Initial load
        loadTasks();
        initSSE();

        // Refresh every 60s as fallback
        setInterval(loadTasks, 60000);
    </script>
    <script src="shared.js?v=20260312"></script>
</body>
</html>
