<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Threads — Dashboard</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            padding: 1rem;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2rem;
            color: #f3e8ff;
            margin-bottom: 0.5rem;
        }

        .header-meta {
            color: #a0a0a0;
            font-size: 0.9rem;
        }

        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.5rem 1rem;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            background: rgba(168, 85, 247, 0.2);
            border-color: rgba(168, 85, 247, 0.5);
        }

        .filter-btn.active {
            background: rgba(168, 85, 247, 0.3);
            border-color: rgba(168, 85, 247, 0.6);
            color: #f3e8ff;
        }

        .search-box {
            width: 100%;
            max-width: 400px;
            padding: 0.6rem 1rem;
            background: rgba(26, 26, 26, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.9rem;
        }

        .search-box:focus {
            outline: none;
            border-color: rgba(168, 85, 247, 0.6);
        }

        .threads-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .thread-card {
            background: linear-gradient(135deg, rgba(19, 18, 34, 0.96) 0%, rgba(34, 24, 52, 0.94) 100%);
            border: 1px solid rgba(168, 85, 247, 0.25);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.2s ease;
        }

        .thread-card:hover {
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .thread-header {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
        }

        .thread-status {
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .status-discovery { background: rgba(147, 51, 234, 0.2); color: #c084fc; border: 1px solid rgba(147, 51, 234, 0.4); }
        .status-qualifying { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.4); }
        .status-active { background: rgba(249, 115, 22, 0.2); color: #fb923c; border: 1px solid rgba(249, 115, 22, 0.4); }
        .status-blocked { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.4); }
        .status-complete { background: rgba(34, 197, 94, 0.2); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.4); }
        .status-ongoing { background: rgba(20, 184, 166, 0.2); color: #5eead4; border: 1px solid rgba(20, 184, 166, 0.4); }

        .thread-title-row {
            flex: 1;
            min-width: 0;
        }

        .thread-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f3e8ff;
            margin-bottom: 0.25rem;
        }

        .thread-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.8rem;
            color: #a0a0a0;
            flex-wrap: wrap;
        }

        .thread-meta-item {
            display: flex;
            align-items: center;
            gap: 0.35rem;
        }

        .thread-entries {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(168, 85, 247, 0.2);
            display: none;
        }

        .thread-card.expanded .thread-entries {
            display: block;
        }

        .entry {
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.3);
            border-left: 3px solid rgba(168, 85, 247, 0.4);
            border-radius: 6px;
            margin-bottom: 0.75rem;
        }

        .entry:last-child {
            margin-bottom: 0;
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
        }

        .entry-agent {
            font-weight: 600;
            color: #c084fc;
        }

        .entry-timestamp {
            color: #a0a0a0;
        }

        .entry-content {
            color: #e0e0e0;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #a0a0a0;
            font-size: 1rem;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 1.5rem;
            color: #a855f7;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: #c084fc;
        }

        .expand-indicator {
            font-size: 0.7rem;
            color: #a0a0a0;
            margin-left: auto;
            flex-shrink: 0;
        }

        .editor-link-btn {
            padding: 0.4rem 0.8rem;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 6px;
            color: #c084fc;
            font-size: 0.75rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .editor-link-btn:hover {
            background: rgba(168, 85, 247, 0.25);
            border-color: rgba(168, 85, 247, 0.5);
            color: #e9d5ff;
        }

        @media (max-width: 768px) {
            .thread-meta {
                flex-direction: column;
                gap: 0.35rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="shared-header"></div>
    <div class="container">
        
        <header>
            <h1>🧵 Research Threads</h1>
            <div class="header-meta" id="thread-count">Loading...</div>
        </header>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="ongoing">Ongoing</button>
            <button class="filter-btn" data-filter="complete">Complete</button>
            <button class="filter-btn" data-filter="blocked">Blocked</button>
            <input type="text" class="search-box" id="search-box" placeholder="Search threads...">
        </div>

        <div class="threads-list" id="threads-list">
            <div class="empty-state">Loading research threads...</div>
        </div>
    </div>

    <script>
        const AGENT_EMOJI = {
            quinn: '🔮',
            forge: '⚒️',
            scout: '🔍',
            adam: '🧑💻'
        };

        let allThreads = [];
        let currentFilter = 'all';
        let searchQuery = '';

        async function fetchThreads() {
            // Try research-queue.json first (production data), then fall back to research.json (new schema)
            const candidates = [
                `/api/research-queue?t=${Date.now()}`,
                `data/research-queue.json?t=${Date.now()}`,
                `./data/research-queue.json?t=${Date.now()}`,
                `/api/research-threads?t=${Date.now()}`,
                `data/research.json?t=${Date.now()}`,
                `./data/research.json?t=${Date.now()}`
            ];

            for (const url of candidates) {
                try {
                    const response = await fetch(url, { cache: 'no-store' });
                    if (!response.ok) continue;
                    const payload = await response.json();
                    
                    // Handle research-queue.json schema {queue: [...]}
                    if (payload && Array.isArray(payload.queue)) {
                        // Convert queue items to thread format
                        return payload.queue.map(item => ({
                            id: item.id,
                            title: item.title,
                            status: item.status === 'complete' ? 'complete' : 
                                   item.status === 'pending' ? 'qualifying' :
                                   item.status === 'queued' ? 'discovery' : 'active',
                            type: item.tags && item.tags[0] ? item.tags[0] : 'exploratory',
                            projectId: item.relatedTopics && item.relatedTopics[0] ? item.relatedTopics[0] : null,
                            createdBy: item.addedBy || 'unknown',
                            createdAt: item.added,
                            updatedAt: item.updated || item.added,
                            entries: item.notes ? [{
                                agent: item.addedBy || 'unknown',
                                timestamp: item.added,
                                content: item.notes
                            }] : []
                        }));
                    }
                    
                    // Handle research.json schema {threads: [...]}
                    if (payload && Array.isArray(payload.threads)) {
                        return payload.threads;
                    }
                } catch (error) {
                    // Try next candidate
                }
            }

            return [];
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTimestamp(isoString) {
            if (!isoString) return 'Unknown';
            const date = new Date(isoString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);

            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            
            return date.toLocaleDateString('en-AU', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function getStatusClass(status) {
            return `status-${(status || 'discovery').toLowerCase()}`;
        }

        function renderThreadCard(thread) {
            const statusClass = getStatusClass(thread.status);
            const createdBy = thread.createdBy || 'unknown';
            const createdByEmoji = AGENT_EMOJI[createdBy] || '🤖';
            const createdByLabel = createdBy.charAt(0).toUpperCase() + createdBy.slice(1);
            const updatedTime = formatTimestamp(thread.updatedAt);
            const createdTime = formatTimestamp(thread.createdAt);
            const entryCount = (thread.entries || []).length;
            const projectTag = thread.projectId ? `<span class="thread-meta-item">📁 ${escapeHtml(thread.projectId)}</span>` : '';

            const entriesHtml = (thread.entries || []).map(entry => {
                const agent = entry.agent || 'unknown';
                const agentEmoji = AGENT_EMOJI[agent] || '🤖';
                const agentLabel = agent.charAt(0).toUpperCase() + agent.slice(1);
                return `
                    <div class="entry">
                        <div class="entry-header">
                            <span class="entry-agent">${agentEmoji} ${escapeHtml(agentLabel)}</span>
                            <span class="entry-timestamp">${formatTimestamp(entry.timestamp)}</span>
                        </div>
                        <div class="entry-content">${escapeHtml(entry.content || '')}</div>
                    </div>
                `;
            }).join('');

            return `
                <div class="thread-card" data-thread-id="${thread.id}" data-status="${(thread.status || '').toLowerCase()}" data-type="${(thread.type || '').toLowerCase()}">
                    <div class="thread-header">
                        <span class="thread-status ${statusClass}" onclick="toggleThread('${thread.id}')">${escapeHtml(thread.status || 'Discovery')}</span>
                        <div class="thread-title-row" onclick="toggleThread('${thread.id}')">
                            <div class="thread-title">${escapeHtml(thread.title || 'Untitled Thread')}</div>
                            <div class="thread-meta">
                                <span class="thread-meta-item">${createdByEmoji} ${escapeHtml(createdByLabel)}</span>
                                <span class="thread-meta-item">📝 ${entryCount} ${entryCount === 1 ? 'entry' : 'entries'}</span>
                                <span class="thread-meta-item">🕒 Updated ${updatedTime}</span>
                                ${projectTag}
                            </div>
                        </div>
                        <a href="editor.html?file=research-items/${thread.id}.md" class="editor-link-btn" onclick="event.stopPropagation()">📝 Open in Editor</a>
                        <span class="expand-indicator" onclick="toggleThread('${thread.id}')">▼</span>
                    </div>
                    <div class="thread-entries">
                        ${entriesHtml || '<div style="color: #a0a0a0; font-size: 0.85rem;">No entries yet</div>'}
                    </div>
                </div>
            `;
        }

        function toggleThread(threadId) {
            const card = document.querySelector(`[data-thread-id="${threadId}"]`);
            if (card) {
                card.classList.toggle('expanded');
            }
        }

        function renderThreads() {
            let filtered = allThreads;

            // Apply status filter
            if (currentFilter !== 'all') {
                filtered = filtered.filter(t => (t.status || '').toLowerCase() === currentFilter);
            }

            // Apply search
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filtered = filtered.filter(t => {
                    const title = (t.title || '').toLowerCase();
                    const entries = (t.entries || []).map(e => (e.content || '').toLowerCase()).join(' ');
                    return title.includes(query) || entries.includes(query);
                });
            }

            const listEl = document.getElementById('threads-list');
            const countEl = document.getElementById('thread-count');

            if (filtered.length === 0) {
                listEl.innerHTML = '<div class="empty-state">No research threads found</div>';
                countEl.textContent = allThreads.length === 0 ? 'No research activity yet' : `${filtered.length} of ${allThreads.length} threads`;
                return;
            }

            // Sort by updatedAt desc
            filtered.sort((a, b) => new Date(b.updatedAt || 0) - new Date(a.updatedAt || 0));

            listEl.innerHTML = filtered.map(renderThreadCard).join('');
            
            const activeCount = allThreads.filter(t => ['discovery', 'qualifying', 'active', 'blocked', 'ongoing'].includes((t.status || '').toLowerCase())).length;
            countEl.textContent = `${filtered.length} threads • ${activeCount} active`;
        }

        async function loadThreads() {
            allThreads = await fetchThreads();
            renderThreads();
        }

        // Filter buttons
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderThreads();
            });
        });

        // Search
        document.getElementById('search-box').addEventListener('input', (e) => {
            searchQuery = e.target.value.trim();
            renderThreads();
        });

        // SSE for live updates
        function initSSE() {
            const sseUrls = ['/api/events', '/events', '/sse'];
            let eventSource = null;

            for (const url of sseUrls) {
                try {
                    eventSource = new EventSource(url);
                    
                    eventSource.addEventListener('research', () => {
                        console.log('Research updated, refreshing...');
                        loadThreads();
                    });

                    eventSource.addEventListener('collaboration', () => {
                        console.log('Collaboration event, refreshing research...');
                        loadThreads();
                    });

                    eventSource.onerror = () => {
                        console.log('SSE error, will retry...');
                    };

                    break; // Successfully connected
                } catch (error) {
                    console.log(`SSE failed for ${url}, trying next...`);
                }
            }
        }

        // Initial load
        loadThreads();
        initSSE();

        // Refresh every 60s as fallback
        setInterval(loadThreads, 60000);
    </script>
    <script src="shared.js?v=20260312"></script>
</body>
</html>
