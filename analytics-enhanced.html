<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — Dashboard</title>
    <link rel="stylesheet" href="shared.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
    <style>
        .analytics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .last-updated {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }
        
        .site-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.2s;
        }
        
        .site-card.highlight {
            border-color: rgba(99, 102, 241, 0.4);
            background: rgba(99, 102, 241, 0.05);
        }
        
        .site-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .site-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .highlight-badge {
            background: rgba(99, 102, 241, 0.2);
            color: #a78bfa;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .metric {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }

        .sparkline-wrap {
            margin: -0.85rem 0 1.25rem;
            height: 40px;
            opacity: 0.95;
        }

        .sparkline-canvas {
            width: 100% !important;
            height: 40px !important;
            display: block;
        }
        
        .metric-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        .metric-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .trend {
            font-size: 0.9rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .trend.up {
            color: #22c55e;
        }
        
        .trend.down {
            color: #ef4444;
        }
        
        .trend.neutral {
            color: var(--text-secondary);
        }
        
        .traffic-sources {
            margin-bottom: 1.5rem;
        }
        
        .section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .source-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .source-item:last-child {
            border-bottom: none;
        }
        
        .source-name {
            font-size: 0.9rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .source-icon {
            font-size: 1rem;
        }
        
        .source-value {
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .source-bar {
            height: 4px;
            background: rgba(99, 102, 241, 0.3);
            border-radius: 2px;
            margin-top: 0.25rem;
            overflow: hidden;
        }
        
        .source-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #a78bfa);
            transition: width 0.3s ease;
        }
        
        .top-pages {
            font-size: 0.85rem;
        }
        
        .page-item {
            display: flex;
            justify-content: space-between;
            padding: 0.4rem 0;
            color: var(--text-secondary);
        }
        
        .page-path {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        
        .page-views {
            font-weight: 600;
            color: var(--text-primary);
            margin-left: 1rem;
        }
        
        .no-data {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
            font-style: italic;
        }
        
        @media (max-width: 768px) {
            .analytics-grid {
                grid-template-columns: 1fr;
            }
            .metrics-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="analytics-header">
            <h1>📊 Analytics</h1>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <div class="last-updated" id="lastUpdated">Loading...</div>
                <button onclick="refreshAnalytics()" id="refreshBtn" style="padding: 0.4rem 1rem; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); border-radius: 8px; color: #a78bfa; font-size: 0.8rem; cursor: pointer; transition: all 0.2s;">🔄 Refresh</button>
            </div>
        </div>
        
        <div class="analytics-grid" id="analyticsGrid">
            <!-- Site cards will be inserted here -->
        </div>
        
        <div class="no-data" id="noData" style="display: none;">
            No analytics data available. Run: python3 scripts/pull-analytics.py
        </div>
    </div>
    
    <script>
        async function loadAnalytics() {
            try {
                const response = await fetch('data/analytics.json');
                const data = await response.json();
                
                if (!data.sites || Object.keys(data.sites).length === 0) {
                    document.getElementById('noData').style.display = 'block';
                    return;
                }
                
                // Update last updated time
                const lastUpdated = new Date(data.lastUpdated);
                document.getElementById('lastUpdated').textContent = 
                    `Updated ${lastUpdated.toLocaleString()}`;
                
                const grid = document.getElementById('analyticsGrid');
                grid.innerHTML = '';
                destroySparklineCharts();

                // Render site cards
                // AAD first (highlighted), then others alphabetically
                const sites = Object.entries(data.sites);
                const aad = sites.find(([name]) => name === 'afteraliendisclosure.com');
                const others = sites.filter(([name]) => name !== 'afteraliendisclosure.com')
                    .sort((a, b) => a[0].localeCompare(b[0]));
                
                const sortedSites = aad ? [aad, ...others] : others;
                
                sortedSites.forEach(([siteName, siteData], index) => {
                    const chartId = buildSparklineId(siteName, index);
                    grid.appendChild(createSiteCard(siteName, siteData, chartId));
                    renderSparkline(chartId, siteData);
                });
                
            } catch (error) {
                console.error('Error loading analytics:', error);
                document.getElementById('noData').style.display = 'block';
            }
        }

        const sparklineCharts = new Map();
        const sparklineMetricPreference = ['users', 'pageViews', 'sessions'];
        
        function buildSparklineId(siteName, index) {
            return `sparkline-${siteName.toLowerCase().replace(/[^a-z0-9]+/g, '-')}-${index}`;
        }

        function destroySparklineCharts() {
            sparklineCharts.forEach((chart) => chart.destroy());
            sparklineCharts.clear();
        }

        function normalizeMetricValue(value) {
            const num = Number(value);
            return Number.isFinite(num) ? num : 0;
        }

        function resolveSparklineMetric(siteData) {
            if (Array.isArray(siteData.daily) && siteData.daily.length > 0) {
                for (const metric of sparklineMetricPreference) {
                    const hasValue = siteData.daily.some((entry) => {
                        const parsed = Number(entry?.[metric]);
                        return Number.isFinite(parsed);
                    });
                    if (hasValue) {
                        return metric;
                    }
                }
            }
            
            if (siteData.week) {
                for (const metric of sparklineMetricPreference) {
                    if (siteData.week[metric] !== undefined) {
                        return metric;
                    }
                }
            }
            return 'users';
        }

        function metricLabel(metric) {
            const labels = {
                users: 'Daily Users',
                pageViews: 'Page Views',
                sessions: 'Sessions'
            };
            return labels[metric] || metric;
        }

        function formatSparklineDate(value) {
            if (!value) {
                return '';
            }
            
            if (/^\d{8}$/.test(String(value))) {
                const year = Number(String(value).slice(0, 4));
                const month = Number(String(value).slice(4, 6)) - 1;
                const day = Number(String(value).slice(6, 8));
                const parsed = new Date(year, month, day);
                return parsed.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
            }

            const parsed = new Date(value);
            if (Number.isNaN(parsed.getTime())) {
                return String(value);
            }
            return parsed.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        }

        function getTrendColor(siteData, metric) {
            const trend = normalizeMetricValue(siteData?.trends?.[metric]);
            if (trend > 0) {
                return '#22c55e';
            }
            if (trend < 0) {
                return '#ef4444';
            }
            return '#60a5fa';
        }

        function getDailySeries(siteData, metric) {
            if (!Array.isArray(siteData.daily)) {
                return [];
            }
            return siteData.daily
                .filter((point) => point && Number.isFinite(Number(point[metric])))
                .slice(-7)
                .map((point) => ({
                    date: point.date || '',
                    value: Number(point[metric] || 0)
                }));
        }

        function getFallbackBars(siteData, metric) {
            const thisWeek = normalizeMetricValue(siteData.week?.[metric]);
            const lastWeek = normalizeMetricValue(siteData.lastWeek?.[metric]);
            return {
                labels: ['Last week', 'This week'],
                values: [lastWeek, thisWeek]
            };
        }

        function renderSparkline(chartId, siteData) {
            const canvas = document.getElementById(chartId);
            if (!canvas || !window.Chart) {
                return;
            }

            const metric = resolveSparklineMetric(siteData);
            const label = metricLabel(metric);
            const trendColor = getTrendColor(siteData, metric);
            const series = getDailySeries(siteData, metric);
            const hasDaily = series.length >= 2;

            const tooltip = {
                backgroundColor: 'rgba(26, 26, 36, 0.95)',
                titleColor: '#f0f0f5',
                bodyColor: '#9090a0',
                borderColor: 'rgba(255, 255, 255, 0.08)',
                borderWidth: 1,
                padding: 10,
                displayColors: false,
                callbacks: {
                    title: (items) => items[0]?.label || '',
                    label: (context) => {
                        const value = Number(context.raw || 0).toLocaleString();
                        return `${label}: ${value}`;
                    }
                }
            };

            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: tooltip
                },
                scales: {
                    x: {
                        display: false
                    },
                    y: {
                        display: false
                    }
                }
            };

            if (hasDaily) {
                const config = {
                    type: 'line',
                    data: {
                        labels: series.map((point) => formatSparklineDate(point.date)),
                        datasets: [{
                            data: series.map((point) => point.value),
                            borderColor: trendColor,
                            backgroundColor: trendColor + '22',
                            borderWidth: 1.75,
                            pointRadius: 0,
                            pointHoverRadius: 3,
                            pointHitRadius: 6,
                            fill: false,
                            tension: 0.35
                        }]
                    },
                    options: {
                        ...commonOptions,
                        interaction: {
                            intersect: false,
                            mode: 'index'
                        },
                        elements: {
                            line: {
                                borderJoinStyle: 'round',
                                borderCapStyle: 'round'
                            }
                        }
                    }
                };
                sparklineCharts.set(chartId, new Chart(canvas, config));
                return;
            }

            const bars = getFallbackBars(siteData, metric);
            const config = {
                type: 'bar',
                data: {
                    labels: bars.labels,
                    datasets: [{
                        label: label,
                        data: bars.values,
                        backgroundColor: [
                            'rgba(96, 165, 250, 0.25)',
                            'rgba(96, 165, 250, 0.55)'
                        ],
                        borderWidth: 0,
                        borderRadius: 4,
                        maxBarThickness: 12
                    }]
                },
                options: {
                    ...commonOptions,
                    plugins: {
                        ...commonOptions.plugins,
                        tooltip: {
                            ...tooltip,
                            callbacks: {
                                title: (items) => items[0]?.label || '',
                                label: (context) => `${label}: ${Number(context.raw || 0).toLocaleString()}`
                            }
                        }
                    },
                    scales: {
                        ...commonOptions.scales,
                        x: {
                            display: false
                        },
                        y: {
                            display: false
                        }
                    }
                }
            };
            sparklineCharts.set(chartId, new Chart(canvas, config));
        }

        function createSiteCard(siteName, data, chartId) {
            const card = document.createElement('div');
            card.className = 'site-card';
            
            // Highlight AAD
            const isAAD = siteName === 'afteraliendisclosure.com';
            if (isAAD) {
                card.classList.add('highlight');
            }
            
            const week = data.week || {};
            const trends = data.trends || {};
            const sources = data.trafficSources || {};
            const topPages = data.topPages || [];
            
            // Calculate total traffic for source percentages
            const totalTraffic = Object.values(sources).reduce((a, b) => a + b, 0);
            
            card.innerHTML = `
                <div class="site-header">
                    <div class="site-name">${siteName}</div>
                    ${isAAD ? '<div class="highlight-badge">📡 Instagram Active</div>' : ''}
                </div>

                <div class="sparkline-wrap">
                    <canvas id="${chartId}" class="sparkline-canvas" aria-label="7-day trend for ${siteName}" role="img"></canvas>
                </div>
                
                <div class="metrics-grid">
                    <div class="metric">
                        <div class="metric-label">Users</div>
                        <div class="metric-value">
                            ${week.users || 0}
                            ${renderTrend(trends.users)}
                        </div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Page Views</div>
                        <div class="metric-value">
                            ${week.pageViews || 0}
                            ${renderTrend(trends.pageViews)}
                        </div>
                    </div>
                    <div class="metric">
                        <div class="metric-label">Sessions</div>
                        <div class="metric-value">
                            ${week.sessions || 0}
                            ${renderTrend(trends.sessions)}
                        </div>
                    </div>
                </div>
                
                ${totalTraffic > 0 ? `
                <div class="traffic-sources">
                    <div class="section-title">Traffic Sources</div>
                    ${renderTrafficSources(sources, totalTraffic)}
                </div>
                ` : ''}
                
                ${topPages.length > 0 ? `
                <div class="top-pages">
                    <div class="section-title">Top Pages</div>
                    ${topPages.map(page => `
                        <div class="page-item">
                            <div class="page-path">${page.path}</div>
                            <div class="page-views">${page.views}</div>
                        </div>
                    `).join('')}
                </div>
                ` : ''}
            `;
            
            return card;
        }
        
        function renderTrend(change) {
            if (change === undefined || change === 0) {
                return '<span class="trend neutral">—</span>';
            }
            
            const direction = change > 0 ? 'up' : 'down';
            const arrow = change > 0 ? '↑' : '↓';
            const absChange = Math.abs(change);
            
            return `<span class="trend ${direction}">${arrow}${absChange}%</span>`;
        }
        
        function renderTrafficSources(sources, total) {
            const sourceConfig = {
                social: { icon: '📱', label: 'Social (Instagram)' },
                organic: { icon: '🔍', label: 'Organic Search' },
                direct: { icon: '🔗', label: 'Direct' },
                referral: { icon: '🌐', label: 'Referral' },
                email: { icon: '📧', label: 'Email' }
            };
            
            return Object.entries(sources)
                .filter(([_, value]) => value > 0)
                .sort((a, b) => b[1] - a[1])
                .map(([source, value]) => {
                    const config = sourceConfig[source] || { icon: '•', label: source };
                    const percent = Math.round((value / total) * 100);
                    
                    return `
                        <div class="source-item">
                            <div class="source-name">
                                <span class="source-icon">${config.icon}</span>
                                ${config.label}
                            </div>
                            <div class="source-value">${value}</div>
                        </div>
                        <div class="source-bar">
                            <div class="source-bar-fill" style="width: ${percent}%"></div>
                        </div>
                    `;
                }).join('');
        }
        
        // Manual refresh - triggers GA pull script then reloads data
        async function refreshAnalytics() {
            const btn = document.getElementById('refreshBtn');
            btn.textContent = '⏳ Pulling...';
            btn.disabled = true;
            try {
                await fetch('/api/analytics/refresh', { method: 'POST' });
                await new Promise(r => setTimeout(r, 3000)); // Wait for pull to complete
                await loadAnalytics();
                btn.textContent = '✅ Done';
                setTimeout(() => { btn.textContent = '🔄 Refresh'; btn.disabled = false; }, 2000);
            } catch(e) {
                // Fallback: just reload the data file
                await loadAnalytics();
                btn.textContent = '🔄 Refresh';
                btn.disabled = false;
            }
        }

        // Load on page load
        loadAnalytics();
        
        // Auto-refresh every 5 minutes
        setInterval(loadAnalytics, 5 * 60 * 1000);
    </script>
</body>
</html>
