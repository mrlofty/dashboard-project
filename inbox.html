<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inbox — Dashboard</title>
    <link rel="stylesheet" href="shared.css">
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js"></script>
    <style>
        .inbox-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
            min-height: calc(100vh - 120px);
        }
        
        .inbox-sidebar {
            border-right: 1px solid var(--border);
            padding-right: 2rem;
        }
        
        .new-item-btn {
            width: 100%;
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 2rem;
            font-size: 1rem;
        }
        
        .new-item-btn:hover {
            opacity: 0.9;
        }
        
        .filters {
            margin-bottom: 2rem;
        }
        
        .filter-group {
            margin-bottom: 1.5rem;
        }
        
        .filter-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .filter-option {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
        }
        
        .filter-option:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .filter-option input[type="checkbox"] {
            margin: 0;
        }
        
        .filter-option label {
            flex: 1;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .filter-count {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        
        .inbox-main {
            overflow-y: auto;
            max-height: calc(100vh - 120px);
        }
        
        .inbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .item-count {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        
        .search-box {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
        }
        
        .search-box:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .inbox-items {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .inbox-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .inbox-item:hover {
            border-color: var(--accent);
            transform: translateX(4px);
        }
        
        .inbox-item.active {
            border-color: var(--accent);
            background: rgba(212, 175, 55, 0.05);
        }
        
        .inbox-item.agent-created {
            border-left: 3px solid #a78bfa;
        }
        
        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }
        
        .item-title {
            font-weight: 600;
            color: var(--text-primary);
            flex: 1;
        }
        
        .item-priority {
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            font-weight: 600;
            margin-left: 0.5rem;
        }
        
        .priority-1, .priority-2 {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        
        .priority-3 {
            background: rgba(249, 115, 22, 0.2);
            color: #f97316;
        }
        
        .priority-4, .priority-5 {
            background: rgba(144, 144, 160, 0.2);
            color: #9090a0;
        }
        
        .item-meta {
            display: flex;
            gap: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            flex-wrap: wrap;
        }
        
        .item-tags {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        
        .tag {
            background: rgba(99, 102, 241, 0.15);
            color: #a78bfa;
            padding: 0.2rem 0.6rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            padding: 2rem;
            overflow-y: auto;
        }
        
        .modal.active {
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        
        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-width: 800px;
            width: 100%;
            padding: 2rem;
            margin-top: 2rem;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 0.75rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.95rem;
            font-family: inherit;
        }
        
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .form-textarea {
            min-height: 200px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9rem;
        }
        
        .tag-selector {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .tag-checkbox {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.4rem 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .tag-checkbox input {
            margin: 0;
        }
        
        .tag-checkbox:has(input:checked) {
            background: rgba(99, 102, 241, 0.2);
            border-color: #a78bfa;
        }
        
        .form-actions {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 2rem;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-size: 0.95rem;
        }
        
        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }
        
        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }
        
        .markdown-content {
            line-height: 1.7;
            color: var(--text-secondary);
        }
        
        .markdown-content h1, .markdown-content h2, .markdown-content h3 {
            color: var(--text-primary);
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }
        
        .markdown-content code {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }
        
        .markdown-content pre {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
        }
        
        .markdown-content pre code {
            background: none;
            padding: 0;
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .command-palette-overlay {
            position: fixed;
            inset: 0;
            z-index: 1800;
            background: linear-gradient(to bottom, rgba(8, 9, 15, 0.72), rgba(8, 9, 15, 0.9));
            backdrop-filter: blur(8px);
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding: 8vh 1rem 2rem;
        }
        
        .command-palette-overlay.active {
            display: flex;
        }
        
        .command-palette {
            width: min(860px, 100%);
            max-width: 860px;
            background: #13131b;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 78vh;
        }
        
        .command-palette-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1rem 1rem 0.875rem;
            background: rgba(255, 255, 255, 0.02);
        }
        
        .command-palette-input {
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: #0f1016;
            color: var(--text-primary);
            border-radius: 10px;
            padding: 0.8rem 0.95rem;
            font-size: 1rem;
            outline: none;
        }
        
        .command-palette-input:focus {
            border-color: var(--accent-purple);
        }
        
        .command-palette-list {
            padding: 0.5rem 0.5rem 0.75rem;
            overflow-y: auto;
            min-height: 220px;
            max-height: calc(78vh - 94px);
        }
        
        .command-palette-group {
            margin-top: 0.35rem;
        }
        
        .command-palette-group:first-child {
            margin-top: 0;
        }
        
        .command-palette-group-label {
            padding: 0.45rem 0.6rem 0.25rem;
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            font-weight: 600;
        }
        
        .command-palette-item {
            display: flex;
            gap: 0.7rem;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            text-align: left;
            border: none;
            color: var(--text-primary);
            border-radius: 10px;
            background: transparent;
            padding: 0.58rem 0.75rem;
            cursor: default;
            font: inherit;
        }
        
        .command-palette-item:hover,
        .command-palette-item.active {
            background: rgba(255, 255, 255, 0.08);
        }
        
        .command-palette-title {
            display: block;
            font-weight: 600;
            font-size: 0.95rem;
        }
        
        .command-palette-subtitle {
            color: var(--text-secondary);
            font-size: 0.82rem;
        }
        
        .command-palette-meta {
            display: flex;
            gap: 0.45rem;
            align-items: center;
            min-width: 96px;
            justify-content: flex-end;
        }
        
        .command-palette-kbd {
            min-width: 24px;
            height: 24px;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 7px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 0.45rem;
            letter-spacing: 0.02em;
            background: rgba(255, 255, 255, 0.03);
        }
        
        .command-palette-tag {
            border: 1px solid rgba(168, 85, 247, 0.55);
            color: #d8b4fe;
            background: rgba(168, 85, 247, 0.12);
            border-radius: 8px;
            font-size: 0.75rem;
            padding: 0.15rem 0.45rem;
        }
        
        .command-palette-empty {
            padding: 1.2rem 0.75rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        @media (max-width: 1024px) {
            .inbox-layout {
                grid-template-columns: 1fr;
            }
            .inbox-sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding-right: 0;
                padding-bottom: 2rem;
            }
        }
    </style>
</head>
<body>
    <div id="shared-header"></div>
    <div class="container main-content">
        <h1>📥 Inbox</h1>
        
        <div class="inbox-layout">
            <!-- Sidebar -->
            <div class="inbox-sidebar">
                <button class="new-item-btn" onclick="openNewItemModal()">+ New Item</button>
                
                <div class="filters">
                    <div class="filter-group">
                        <div class="filter-title">Status</div>
                        <div class="filter-option">
                            <input type="checkbox" id="filter-inbox" value="inbox" checked onchange="applyFilters()">
                            <label for="filter-inbox">Inbox</label>
                            <span class="filter-count" id="count-inbox">0</span>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="filter-active" value="active" checked onchange="applyFilters()">
                            <label for="filter-active">Active</label>
                            <span class="filter-count" id="count-active">0</span>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="filter-done" value="done" onchange="applyFilters()">
                            <label for="filter-done">Done</label>
                            <span class="filter-count" id="count-done">0</span>
                        </div>
                    </div>
                    
                    <div class="filter-group">
                        <div class="filter-title">Assignee</div>
                        <div class="filter-option">
                            <input type="checkbox" id="filter-adam" value="Adam" checked onchange="applyFilters()">
                            <label for="filter-adam">Adam</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="filter-quinn" value="Quinn" checked onchange="applyFilters()">
                            <label for="filter-quinn">Quinn</label>
                        </div>
                        <div class="filter-option">
                            <input type="checkbox" id="filter-forge" value="Forge" checked onchange="applyFilters()">
                            <label for="filter-forge">Forge</label>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Main Content -->
            <div class="inbox-main">
                <div class="inbox-header">
                    <div class="item-count" id="itemCount">0 items</div>
                </div>
                
                <input 
                    type="text" 
                    class="search-box" 
                    placeholder="Search items..." 
                    id="searchBox"
                    oninput="applyFilters()">
                
                <div class="inbox-items" id="inboxItems">
                    <!-- Items will be inserted here -->
                </div>
                
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-state-icon">📥</div>
                    <h3>No items found</h3>
                    <p>Create a new item or adjust your filters</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- New/Edit Item Modal -->
    <div class="modal" id="itemModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">New Item</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            
            <form id="itemForm" onsubmit="saveItem(event)">
                <div class="form-group">
                    <label class="form-label">Title *</label>
                    <input type="text" class="form-input" id="itemTitle" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Description (Markdown)</label>
                    <textarea class="form-textarea" id="itemBody" placeholder="Write in markdown..."></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Tags</label>
                    <div class="tag-selector">
                        <label class="tag-checkbox">
                            <input type="checkbox" name="tags" value="project"> project
                        </label>
                        <label class="tag-checkbox">
                            <input type="checkbox" name="tags" value="personal"> personal
                        </label>
                        <label class="tag-checkbox">
                            <input type="checkbox" name="tags" value="infrastructure"> infrastructure
                        </label>
                        <label class="tag-checkbox">
                            <input type="checkbox" name="tags" value="research"> research
                        </label>
                        <label class="tag-checkbox">
                            <input type="checkbox" name="tags" value="content"> content
                        </label>
                        <label class="tag-checkbox">
                            <input type="checkbox" name="tags" value="design"> design
                        </label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Priority</label>
                    <select class="form-select" id="itemPriority">
                        <option value="5">5 - Low</option>
                        <option value="4">4</option>
                        <option value="3" selected>3 - Medium</option>
                        <option value="2">2</option>
                        <option value="1">1 - High</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Assignee</label>
                    <select class="form-select" id="itemAssignee">
                        <option value="Adam">Adam</option>
                        <option value="Quinn">Quinn</option>
                        <option value="Forge">Forge</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select class="form-select" id="itemStatus">
                        <option value="inbox" selected>Inbox</option>
                        <option value="active">Active</option>
                        <option value="done">Done</option>
                        <option value="archived">Archived</option>
                    </select>
                </div>
                
                <input type="hidden" id="itemId">
                
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Item</button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- View Item Modal -->
    <div class="modal" id="viewModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="viewTitle"></h2>
                <button class="modal-close" onclick="closeViewModal()">&times;</button>
            </div>
            
            <div id="viewMeta" style="margin-bottom: 2rem; color: var(--text-secondary); font-size: 0.9rem;"></div>
            
            <div class="markdown-content" id="viewBody"></div>
            
            <div class="form-actions">
                <button class="btn btn-secondary" onclick="closeViewModal()">Close</button>
                <button class="btn btn-primary" onclick="editCurrentItem()">Edit</button>
            </div>
        </div>
    </div>

    <div class="command-palette-overlay" id="commandPalette">
        <div class="command-palette" id="commandPalettePanel" role="dialog" aria-modal="true" aria-label="Command palette">
            <div class="command-palette-header">
                <input
                    id="commandPaletteInput"
                    class="command-palette-input"
                    type="text"
                    placeholder="Type a command or search items by title..."
                    autocomplete="off">
            </div>
            <div class="command-palette-list" id="commandPaletteList"></div>
        </div>
    </div>
    
    <script>
        let items = [];
        let currentItemId = null;
        let paletteOpen = false;
        let paletteSelectedIndex = 0;
        let paletteResults = [];
        let lastActiveElement = null;
        let commandTagFilter = null;
        let ignoreTagFilterReset = false;
        let recentCommands = [];
        const commandHistoryLimit = 5;
        const paletteCommands = [
            {
                id: 'new-item',
                title: 'New item',
                subtitle: 'Create a fresh inbox item',
                group: 'Quick actions',
                shortcut: 'N',
                run: () => openNewItemModal({ tags: [] })
            },
            {
                id: 'new-project',
                title: 'New project',
                subtitle: 'Create a new project item',
                group: 'Quick actions',
                shortcut: 'P',
                run: () => openNewItemModal({ title: 'Project: ', tags: ['project'], assignee: 'Adam', status: 'inbox' })
            },
            {
                id: 'new-research',
                title: 'New research',
                subtitle: 'Start a research task',
                group: 'Quick actions',
                shortcut: 'R',
                run: () => openNewItemModal({ title: 'Research: ', tags: ['research'], assignee: 'Adam', status: 'inbox' })
            },
            {
                id: 'archive-all-done',
                title: 'Archive all done',
                subtitle: 'Move every completed item to Archived',
                group: 'Quick actions',
                shortcut: 'A',
                run: archiveDoneItems
            },
            {
                id: 'show-only-active',
                title: 'Show only active',
                subtitle: 'Filter list to only active items',
                group: 'Filter commands',
                run: () => setStatusFilterOnly('active')
            },
            {
                id: 'show-quinn-tasks',
                title: 'Show Quinn tasks',
                subtitle: 'Filter list to Quinn assignee',
                group: 'Filter commands',
                run: () => setAssigneeFilterOnly('Quinn')
            },
            {
                id: 'show-research-items',
                title: 'Show research items',
                subtitle: 'Filter list to research-tagged items',
                group: 'Filter commands',
                run: () => setTagFilterOnly('research')
            },
            {
                id: 'jump-to-inbox',
                title: 'Jump to inbox',
                subtitle: 'Show inbox status items',
                group: 'Jump to status',
                run: () => jumpToStatusFilter('inbox')
            },
            {
                id: 'jump-to-done',
                title: 'Jump to done',
                subtitle: 'Show done status items',
                group: 'Jump to status',
                run: () => jumpToStatusFilter('done')
            }
        ];
        
        // Load data
        async function loadInbox() {
            try {
                const response = await fetch('data/inbox.json');
                items = await response.json();
            } catch (error) {
                console.log('No inbox data found, starting fresh');
                items = [];
            }
            
            renderItems();
        }
        
        // Save data
        function saveData() {
            // In production, this would POST to an API
            // For now, just log (manual file update needed)
            console.log('Save inbox data:', items);
            localStorage.setItem('inbox-data', JSON.stringify(items));
        }
        
        // Render items
        function renderItems() {
            const container = document.getElementById('inboxItems');
            const emptyState = document.getElementById('emptyState');
            
            // Apply filters
            const filtered = filterItems();
            
            // Update counts
            document.getElementById('itemCount').textContent = `${filtered.length} item${filtered.length !== 1 ? 's' : ''}`;
            
            const statusCounts = {
                inbox: items.filter(i => i.status === 'inbox').length,
                active: items.filter(i => i.status === 'active').length,
                done: items.filter(i => i.status === 'done').length
            };
            
            Object.entries(statusCounts).forEach(([status, count]) => {
                const el = document.getElementById(`count-${status}`);
                if (el) el.textContent = count;
            });
            
            // Render
            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            container.innerHTML = filtered.map(item => renderItemCard(item)).join('');
        }
        
        function renderItemCard(item) {
            const agentClass = item.source !== 'human' ? 'agent-created' : '';
            
            return `
                <div class="inbox-item ${agentClass}" onclick="viewItem('${item.id}')">
                    <div class="item-header">
                        <div class="item-title">${item.title}</div>
                        <div class="item-priority priority-${item.priority}">${item.priority}</div>
                    </div>
                    <div class="item-meta">
                        <span>👤 ${item.assignee}</span>
                        <span>📅 ${new Date(item.created).toLocaleDateString()}</span>
                        ${item.source !== 'human' ? `<span>🤖 ${item.source}</span>` : ''}
                    </div>
                    ${item.tags.length > 0 ? `
                        <div class="item-tags">
                            ${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `;
        }
        
        function filterItems() {
            // Get active filters
            const statusFilters = Array.from(document.querySelectorAll('input[type="checkbox"][value^="inbox"], input[type="checkbox"][value="active"], input[type="checkbox"][value="done"]'))
                .filter(cb => cb.checked)
                .map(cb => cb.value);
            
            const assigneeFilters = Array.from(document.querySelectorAll('input[type="checkbox"][value="Adam"], input[type="checkbox"][value="Quinn"], input[type="checkbox"][value="Forge"]'))
                .filter(cb => cb.checked)
                .map(cb => cb.value);
            
            const searchTerm = document.getElementById('searchBox').value.toLowerCase();
            
            return items.filter(item => {
                // Status filter
                if (!statusFilters.includes(item.status)) return false;
                
                // Assignee filter
                if (!assigneeFilters.includes(item.assignee)) return false;
                
                // Search filter
                if (searchTerm) {
                    const searchable = `${item.title} ${item.body} ${item.tags.join(' ')}`.toLowerCase();
                    if (!searchable.includes(searchTerm)) return false;
                }

                if (commandTagFilter && !(item.tags || []).includes(commandTagFilter)) return false;
                
                return true;
            });
        }
        
        function applyFilters() {
            if (!ignoreTagFilterReset) {
                commandTagFilter = null;
            }

            renderItems();
        }
        
        // Modal functions
        function openNewItemModal(preset = {}) {
            document.getElementById('modalTitle').textContent = 'New Item';
            document.getElementById('itemForm').reset();
            document.getElementById('itemId').value = '';
            document.getElementById('itemTitle').value = preset.title || '';
            document.getElementById('itemBody').value = preset.body || '';
            document.getElementById('itemPriority').value = preset.priority || '3';
            document.getElementById('itemAssignee').value = preset.assignee || 'Adam';
            document.getElementById('itemStatus').value = preset.status || 'inbox';
            document.querySelectorAll('input[name="tags"]').forEach(cb => {
                cb.checked = (preset.tags || []).includes(cb.value);
            });
            document.getElementById('itemModal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('itemModal').classList.remove('active');
        }
        
        function viewItem(id) {
            const item = items.find(i => i.id === id);
            if (!item) return;
            
            currentItemId = id;
            
            document.getElementById('viewTitle').textContent = item.title;
            document.getElementById('viewMeta').innerHTML = `
                <div style="display: flex; gap: 1.5rem; flex-wrap: wrap;">
                    <span>👤 ${item.assignee}</span>
                    <span>⚡ Priority ${item.priority}</span>
                    <span>📅 ${new Date(item.created).toLocaleDateString()}</span>
                    ${item.source !== 'human' ? `<span>🤖 ${item.source}</span>` : ''}
                </div>
                ${item.tags.length > 0 ? `
                    <div style="display: flex; gap: 0.5rem; margin-top: 0.75rem;">
                        ${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                ` : ''}
            `;
            
            const html = marked.parse(item.body || '');
            document.getElementById('viewBody').innerHTML = html;
            
            document.getElementById('viewModal').classList.add('active');
        }
        
        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('active');
            currentItemId = null;
        }
        
        function editCurrentItem() {
            if (!currentItemId) return;
            
            const item = items.find(i => i.id === currentItemId);
            if (!item) return;
            
            closeViewModal();
            
            // Populate form
            document.getElementById('modalTitle').textContent = 'Edit Item';
            document.getElementById('itemId').value = item.id;
            document.getElementById('itemTitle').value = item.title;
            document.getElementById('itemBody').value = item.body || '';
            document.getElementById('itemPriority').value = item.priority;
            document.getElementById('itemAssignee').value = item.assignee;
            document.getElementById('itemStatus').value = item.status;
            
            // Set tags
            document.querySelectorAll('input[name="tags"]').forEach(cb => {
                cb.checked = item.tags.includes(cb.value);
            });
            
            document.getElementById('itemModal').classList.add('active');
        }
        
        function saveItem(event) {
            event.preventDefault();
            
            const id = document.getElementById('itemId').value || `item-${Date.now()}`;
            const title = document.getElementById('itemTitle').value;
            const body = document.getElementById('itemBody').value;
            const priority = parseInt(document.getElementById('itemPriority').value);
            const assignee = document.getElementById('itemAssignee').value;
            const status = document.getElementById('itemStatus').value;
            
            const tags = Array.from(document.querySelectorAll('input[name="tags"]:checked'))
                .map(cb => cb.value);
            
            const existingItem = items.find(i => i.id === id);
            
            if (existingItem) {
                // Update
                Object.assign(existingItem, {
                    title,
                    body,
                    tags,
                    priority,
                    assignee,
                    status,
                    updated: new Date().toISOString()
                });
            } else {
                // Create
                items.push({
                    id,
                    title,
                    body,
                    tags,
                    priority,
                    assignee,
                    status,
                    source: 'human',
                    created: new Date().toISOString(),
                    updated: new Date().toISOString()
                });
            }
            
            saveData();
            renderItems();
            closeModal();
        }

        function getPaletteCommandScore(text, query) {
            if (!query) return 0;
            const value = String(text || '').toLowerCase();
            const q = query.toLowerCase();

            if (value.startsWith(q)) return 1;
            if (value.includes(q)) return 2;
            return -1;
        }

        function commandById(id) {
            return paletteCommands.find(item => item.id === id);
        }

        function addToRecentCommands(id) {
            recentCommands = [id, ...recentCommands.filter(commandId => commandId !== id)].slice(0, commandHistoryLimit);
            localStorage.setItem('inbox-recent-commands', JSON.stringify(recentCommands));
        }

        function executePaletteCommand(command) {
            if (!command || !command.run) return;
            closeCommandPalette();
            command.run();
            addToRecentCommands(command.id);
        }

        function setStatusFilterOnly(status) {
            ignoreTagFilterReset = true;
            document.getElementById('filter-inbox').checked = status === 'inbox';
            document.getElementById('filter-active').checked = status === 'active';
            document.getElementById('filter-done').checked = status === 'done';
            applyFilters();
            ignoreTagFilterReset = false;
        }

        function setAssigneeFilterOnly(assignee) {
            ignoreTagFilterReset = true;
            document.getElementById('filter-adam').checked = assignee === 'Adam';
            document.getElementById('filter-quinn').checked = assignee === 'Quinn';
            document.getElementById('filter-forge').checked = assignee === 'Forge';
            applyFilters();
            ignoreTagFilterReset = false;
        }

        function setTagFilterOnly(tag) {
            ignoreTagFilterReset = true;
            commandTagFilter = tag;
            applyFilters();
            ignoreTagFilterReset = false;
        }

        function jumpToStatusFilter(status) {
            setStatusFilterOnly(status);
            const mainList = document.querySelector('.inbox-main');
            if (mainList) {
                mainList.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function archiveDoneItems() {
            let changed = false;

            items.forEach(item => {
                if (item.status === 'done') {
                    item.status = 'archived';
                    item.updated = new Date().toISOString();
                    changed = true;
                }
            });

            if (changed) {
                saveData();
                renderItems();
            }
        }

        function navigateToItem(itemId) {
            closeCommandPalette();
            viewItem(itemId);
        }

        function normalizePaletteQuery() {
            return document.getElementById('commandPaletteInput').value.trim();
        }

        function getItemPaletteCommands(query) {
            if (!query) return [];
            const q = query.toLowerCase();

            return items
                .map(item => {
                    const score = getPaletteCommandScore(item.title, q);
                    if (score === -1) return null;
                    return {
                        id: `item-${item.id}`,
                        title: item.title,
                        subtitle: `Open ${item.title} • ${item.status} • ${item.assignee}`,
                        group: 'Navigate items',
                        run: () => navigateToItem(item.id),
                        score
                    };
                })
                .filter(Boolean)
                .sort((a, b) => a.score - b.score || a.title.localeCompare(b.title))
                .slice(0, 12);
        }

        function renderCommandPaletteResults() {
            const input = document.getElementById('commandPaletteInput');
            const list = document.getElementById('commandPaletteList');
            const query = normalizePaletteQuery();
            const q = query.toLowerCase();

            const grouped = {
                recent: [],
                quick: [],
                filter: [],
                jump: [],
                items: []
            };

            const seen = new Set();

            recentCommands.forEach(commandId => {
                const command = commandById(commandId);
                if (!command) return;
                const score = getPaletteCommandScore(command.title, q);
                if (query && score === -1) return;
                grouped.recent.push({ ...command, score: query ? score : 0, _type: 'command' });
                seen.add(command.id);
            });

            const staticCommands = paletteCommands
                .filter(item => !seen.has(item.id))
                .map(item => ({
                ...item,
                score: getPaletteCommandScore(item.title, q),
                _type: 'command'
            })).filter(item => !query || item.score !== -1);

            grouped.quick = staticCommands.filter(item => item.group === 'Quick actions');
            grouped.filter = staticCommands.filter(item => item.group === 'Filter commands');
            grouped.jump = staticCommands.filter(item => item.group === 'Jump to status');

            grouped.items = getItemPaletteCommands(query)
                .filter(item => !seen.has(item.id));

            list.innerHTML = '';
            paletteResults = [];
            const makeItemRow = (command, active = false) => {
                const item = document.createElement('button');
                item.type = 'button';
                item.className = `command-palette-item${active ? ' active' : ''}`;
                item.dataset.paletteIndex = String(paletteResults.length);
                item.addEventListener('click', () => {
                    executePaletteCommand(command);
                });

                const shortcut = command.shortcut || '';
                const title = document.createElement('div');
                title.className = 'command-palette-title';
                title.textContent = command.title;

                const subtitle = document.createElement('div');
                subtitle.className = 'command-palette-subtitle';
                subtitle.textContent = command.subtitle || '';

                const meta = document.createElement('div');
                meta.className = 'command-palette-meta';
                if (shortcut) {
                    const kbd = document.createElement('span');
                    kbd.className = 'command-palette-kbd';
                    kbd.textContent = shortcut;
                    meta.appendChild(kbd);
                }
                if (command._type === 'item') {
                    const itemTag = document.createElement('span');
                    itemTag.className = 'command-palette-tag';
                    itemTag.textContent = 'item';
                    meta.appendChild(itemTag);
                }

                const textWrap = document.createElement('div');
                textWrap.appendChild(title);
                textWrap.appendChild(subtitle);

                item.appendChild(textWrap);
                item.appendChild(meta);
                paletteResults.push(command);
                list.appendChild(item);
                return item;
            };

            const addSection = (title, rows) => {
                if (!rows.length) return;
                const section = document.createElement('div');
                section.className = 'command-palette-group';
                const sectionLabel = document.createElement('div');
                sectionLabel.className = 'command-palette-group-label';
                sectionLabel.textContent = title;
                section.appendChild(sectionLabel);
                rows.forEach((row) => {
                    row._type = row._type || 'command';
                    const command = row;
                    const node = makeItemRow(command);
                    section.appendChild(node);
                });
                list.appendChild(section);
            };

            const sortSection = (commands) => commands.sort((a, b) => {
                if (a.score !== b.score) return a.score - b.score;
                return a.title.localeCompare(b.title);
            });
            const markForItems = grouped.items.map(item => ({ ...item, _type: 'item' }));

            grouped.quick = sortSection(grouped.quick);
            grouped.filter = sortSection(grouped.filter);
            grouped.jump = sortSection(grouped.jump);
            grouped.items = sortSection(markForItems);

            addSection('Recent commands', grouped.recent);
            addSection('Quick actions', grouped.quick);
            addSection('Filter commands', grouped.filter);
            addSection('Jump to status', grouped.jump);
            addSection('Navigate items', grouped.items);

            if (!paletteResults.length) {
                const emptyState = document.createElement('div');
                emptyState.className = 'command-palette-empty';
                emptyState.textContent = query
                    ? `No matches for "${query}"`
                    : 'No command matches available';
                list.appendChild(emptyState);
            }

            paletteSelectedIndex = paletteResults.length ? 0 : -1;
            highlightPaletteSelection();
            input.focus();
        }

        function highlightPaletteSelection() {
            const nodes = document.querySelectorAll('.command-palette-item');
            nodes.forEach((node, index) => {
                node.classList.toggle('active', index === paletteSelectedIndex);
            });

            const activeNode = document.querySelector('.command-palette-item.active');
            if (activeNode) {
                activeNode.scrollIntoView({ block: 'nearest', inline: 'nearest' });
            }
        }

        function movePaletteSelection(delta) {
            if (!paletteResults.length) return;
            paletteSelectedIndex = (paletteSelectedIndex + delta + paletteResults.length) % paletteResults.length;
            highlightPaletteSelection();
        }

        function openCommandPalette() {
            const overlay = document.getElementById('commandPalette');
            const input = document.getElementById('commandPaletteInput');
            const list = document.getElementById('commandPaletteList');
            overlay.classList.add('active');
            paletteOpen = true;
            if (!paletteResults.length) {
                list.innerHTML = '';
            }
            lastActiveElement = document.activeElement;
            input.value = '';
            recentCommands = JSON.parse(localStorage.getItem('inbox-recent-commands') || '[]');
            renderCommandPaletteResults();
            input.focus();
        }

        function closeCommandPalette() {
            const overlay = document.getElementById('commandPalette');
            overlay.classList.remove('active');
            paletteOpen = false;
            paletteResults = [];
            paletteSelectedIndex = -1;
            if (lastActiveElement && typeof lastActiveElement.focus === 'function') {
                lastActiveElement.focus();
            }
        }

        function handlePaletteKeydown(event) {
            if (!paletteOpen) return;

            if (event.key === 'Escape') {
                event.preventDefault();
                closeCommandPalette();
                return;
            }

            if (event.key === 'ArrowDown') {
                event.preventDefault();
                movePaletteSelection(1);
                return;
            }

            if (event.key === 'ArrowUp') {
                event.preventDefault();
                movePaletteSelection(-1);
                return;
            }

            if (event.key === 'Enter') {
                event.preventDefault();
                const command = paletteResults[paletteSelectedIndex];
                executePaletteCommand(command);
            }
        }
        
        // Load on page load
        recentCommands = JSON.parse(localStorage.getItem('inbox-recent-commands') || '[]');

        document.addEventListener('keydown', (event) => {
            if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'k') {
                event.preventDefault();
                if (paletteOpen) {
                    closeCommandPalette();
                } else {
                    openCommandPalette();
                }
                return;
            }

            if (paletteOpen) {
                handlePaletteKeydown(event);
                return;
            }
        });

        document.getElementById('commandPaletteInput').addEventListener('input', () => renderCommandPaletteResults());
        document.getElementById('commandPalette').addEventListener('click', (event) => {
            if (event.target.id === 'commandPalette') {
                closeCommandPalette();
            }
        });

        loadInbox();
    </script>
    <script src="shared.js"></script>
</body>
</html>
