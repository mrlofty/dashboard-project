<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoots | Quinn & Adam</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        :root {
            --bg-primary: #0f0f14;
            --bg-card: #1a1a24;
            --bg-card-hover: #22222e;
            --bg-input: #14141e;
            --border: rgba(255, 255, 255, 0.08);
            --border-focus: rgba(212, 175, 55, 0.4);
            --text-primary: #f0f0f5;
            --text-secondary: #9090a0;
            --text-muted: #606070;
            --accent: #d4af37;
            --accent-soft: rgba(212, 175, 55, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }

        .page-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.5rem;
        }
        .page-header h1 { font-size: 1.5rem; }
        .page-header p { color: var(--text-secondary); font-size: 0.85rem; margin-top: 0.25rem; }

        .btn {
            padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s; border: 1px solid var(--border);
            background: var(--bg-card); color: var(--text-primary);
        }
        .btn:hover { background: var(--bg-card-hover); }
        .btn-accent { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
        .btn-accent:hover { background: #c49f2f; }

        /* Pipeline view */
        .pipeline {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .pipeline-stage {
            flex: 1;
            min-width: 170px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.75rem;
        }

        .pipeline-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border);
        }

        .pipeline-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .pipeline-count {
            font-size: 0.7rem;
            padding: 0.15rem 0.4rem;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            color: var(--text-muted);
        }

        .pipeline-card {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.6rem 0.75rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pipeline-card:hover {
            border-color: rgba(212, 175, 55, 0.3);
            background: var(--bg-card-hover);
        }

        .pipeline-card[draggable="true"] {
            cursor: grab;
        }

        .pipeline-card[draggable="true"]:active {
            cursor: grabbing;
        }

        .pipeline-stage.drag-over {
            background: rgba(212, 175, 55, 0.05);
            border: 1px dashed rgba(212, 175, 55, 0.4);
            border-radius: 10px;
        }

        .pipeline-card-title {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 0.2rem;
        }

        .pipeline-card-model {
            font-size: 0.75rem;
            color: var(--accent);
        }

        .pipeline-card-date {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .pipeline-card-payment {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.1rem 0.4rem;
            border-radius: 3px;
            margin-top: 0.3rem;
        }

        /* View toggle */
        .view-toggle {
            display: flex;
            gap: 0.25rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.2rem;
        }

        .view-btn {
            padding: 0.35rem 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .view-btn.active { background: var(--accent-soft); color: var(--accent); }
        .view-btn:hover { color: var(--text-primary); }

        /* Table view */
        .table-view { display: none; }
        .table-view.active { display: block; }
        .pipeline.active { display: flex; }

        .shoots-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .shoots-table th {
            text-align: left;
            padding: 0.6rem 0.75rem;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            user-select: none;
        }

        .shoots-table th:hover { color: var(--accent); }

        .shoots-table td {
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: middle;
        }

        .shoots-table tr:hover td { background: rgba(255,255,255,0.02); }

        /* Status badge */
        .status-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .payment-badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        /* Release warning */
        .release-warning {
            color: #ef4444;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .release-ok {
            color: #22c55e;
            font-size: 0.7rem;
        }

        /* Stats */
        .stats-bar { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card {
            flex: 1; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 10px; padding: 1rem 1.25rem;
        }
        .stat-value { font-size: 1.75rem; font-weight: 700; }
        .stat-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

        /* Filters */
        .toolbar { display: flex; gap: 0.75rem; margin-bottom: 1.25rem; flex-wrap: wrap; align-items: center; }
        .filter-btn {
            padding: 0.4rem 0.75rem; background: var(--bg-card); border: 1px solid var(--border);
            border-radius: 6px; color: var(--text-secondary); font-size: 0.8rem; cursor: pointer; transition: all 0.2s;
        }
        .filter-btn:hover { border-color: var(--accent); color: var(--text-primary); }
        .filter-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }

        .search-box {
            flex: 1; min-width: 180px; padding: 0.5rem 0.75rem;
            background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px;
            color: var(--text-primary); font-size: 0.85rem;
        }
        .search-box::placeholder { color: var(--text-muted); }
        .search-box:focus { outline: none; border-color: var(--border-focus); }

        .model-link { color: var(--accent); text-decoration: none; }
        .model-link:hover { text-decoration: underline; }

        /* Shoot detail modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7); z-index: 200; justify-content: center; align-items: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
            padding: 1.5rem; width: 520px; max-width: 95vw; max-height: 90vh; overflow-y: auto;
        }
        .modal h2 { font-size: 1.1rem; margin-bottom: 1rem; }
        .form-group { margin-bottom: 0.75rem; }
        .form-label { display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
        .form-input {
            width: 100%; padding: 0.5rem 0.75rem; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-size: 0.85rem;
        }
        .form-input:focus { outline: none; border-color: var(--border-focus); }
        .form-textarea {
            width: 100%; padding: 0.5rem 0.75rem; background: var(--bg-input);
            border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary);
            font-size: 0.85rem; min-height: 60px; resize: vertical; font-family: inherit;
        }
        .form-textarea:focus { outline: none; border-color: var(--border-focus); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem; }

        @media (max-width: 768px) {
            .pipeline { flex-direction: column; }
            .pipeline-stage { min-width: unset; }
            .stats-bar { flex-wrap: wrap; }
            .stat-card { min-width: 120px; }
        }
    </style>
</head>
<body>
    <div id="shared-header"></div>

    <div class="container">
        <div class="page-header">
            <div>
                <h1>📋 Shoots</h1>
                <p>All shoots across all models — pipeline and table views.</p>
            </div>
            <div style="display:flex;gap:0.75rem;align-items:center;">
                <div class="view-toggle">
                    <button class="view-btn active" data-view="pipeline" onclick="setView('pipeline', this)">Pipeline</button>
                    <button class="view-btn" data-view="table" onclick="setView('table', this)">Table</button>
                </div>
                <button class="btn btn-accent" onclick="openAddShoot()">+ New Shoot</button>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card"><div class="stat-value" id="stat-total">-</div><div class="stat-label">Total Shoots</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-upcoming">-</div><div class="stat-label">Upcoming</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-editing">-</div><div class="stat-label">In Editing</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-unpaid">-</div><div class="stat-label">Awaiting Payment</div></div>
            <div class="stat-card"><div class="stat-value" id="stat-revenue">-</div><div class="stat-label">Revenue</div></div>
        </div>

        <!-- Filters -->
        <div class="toolbar">
            <input class="search-box" id="searchBox" type="text" placeholder="Search shoots..." oninput="render()">
            <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" data-filter="collab" onclick="setFilter('collab', this)">🤝 Collabs</button>
            <button class="filter-btn" data-filter="event" onclick="setFilter('event', this)">📅 Events</button>
            <button class="filter-btn" data-filter="paid" onclick="setFilter('paid', this)">💰 Paid</button>
            <button class="filter-btn" data-filter="hold" onclick="setFilter('hold', this)">🚫 Hold Edits</button>
        </div>

        <!-- Pipeline View -->
        <div class="pipeline active" id="pipelineView"></div>

        <!-- Table View -->
        <div class="table-view" id="tableView">
            <table class="shoots-table">
                <thead>
                    <tr>
                        <th onclick="sortBy('title')">Shoot</th>
                        <th onclick="sortBy('type')">Type</th>
                        <th onclick="sortBy('modelName')">Model(s)</th>
                        <th onclick="sortBy('date')">Date</th>
                        <th onclick="sortBy('location')">Location</th>
                        <th onclick="sortBy('status')">Status</th>
                        <th onclick="sortBy('payment')">Payment</th>
                        <th>Release</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Add Shoot Modal -->
    <div class="modal-overlay" id="addShootModal">
        <div class="modal">
            <h2>New Shoot</h2>
            <div class="form-group">
                <label class="form-label">Title *</label>
                <input class="form-input" id="fTitle" type="text" placeholder="Shoot name">
            </div>
            <div class="form-group">
                <label class="form-label">Type</label>
                <select class="form-input" id="fType">
                    <option value="collab">🤝 Collab (TFP)</option>
                    <option value="paid">💰 Paid Session</option>
                    <option value="event">📅 Event</option>
                    <option value="personal">📷 Personal</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Model(s) *</label>
                <select class="form-input" id="fModel" multiple size="4" style="min-height:80px;"></select>
                <div style="font-size:0.7rem;color:var(--text-muted);margin-top:0.2rem;">Hold Cmd/Ctrl to select multiple for events</div>
            </div>
            <div class="form-group">
                <label class="form-label">Date</label>
                <input class="form-input" id="fDate" type="date">
            </div>
            <div class="form-group">
                <label class="form-label">Location</label>
                <input class="form-input" id="fLocation" type="text" placeholder="Freeform or select below">
            </div>
            <div class="form-group">
                <label class="form-label">📍 From Database</label>
                <select class="form-input" id="fLocationDb" onchange="if(this.value){document.getElementById('fLocation').value=this.options[this.selectedIndex].text.split(' (')[0]}">
                    <option value="">— Pick a known location —</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">🗺️ Route</label>
                <select class="form-input" id="fRoute">
                    <option value="">— No route —</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Concept</label>
                <input class="form-input" id="fConcept" type="text" placeholder="Portrait / Street / Editorial">
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <select class="form-input" id="fStatus">
                    <option value="concept">Concept</option>
                    <option value="planned">Planned</option>
                    <option value="scheduled" selected>Scheduled</option>
                    <option value="shot">Shot</option>
                    <option value="editing">Editing</option>
                    <option value="delivered">Delivered</option>
                    <option value="published">Published</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Payment</label>
                <select class="form-input" id="fPayment">
                    <option value="tfp" selected>TFP (Trade for Portfolio)</option>
                    <option value="unpaid">Unpaid</option>
                    <option value="deposit">Deposit Paid</option>
                    <option value="paid">Fully Paid</option>
                    <option value="na">N/A</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Total Amount ($)</label>
                <input class="form-input" id="fAmount" type="number" placeholder="0">
            </div>
            <div class="form-group">
                <label class="form-label">Notes</label>
                <textarea class="form-textarea" id="fNotes" placeholder="Shoot notes..."></textarea>
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeAddShoot()">Cancel</button>
                <button class="btn btn-accent" onclick="saveShoot()">Create Shoot</button>
            </div>
        </div>
    </div>

    <div id="shared-footer"></div>

    <script>
        const API = `http://${window.location.hostname}:8081/api`;
        let shootsData = { shoots: [], statuses: {}, paymentStatuses: {} };
        let modelsData = { models: [] };
        let currentView = 'pipeline';
        let currentFilter = 'all';
        let sortField = 'date';
        let sortAsc = false;

        const STATUS_ORDER = ['concept', 'planned', 'scheduled', 'shot', 'editing', 'delivered', 'published'];

        let locationsData = { locations: [] };
        let routesData = { routes: [] };

        async function loadData() {
            try {
                const [sRes, mRes, lRes, rRes] = await Promise.all([
                    fetch('data/shoots.json'),
                    fetch('data/models.json'),
                    fetch('data/locations.json'),
                    fetch('data/routes.json')
                ]);
                shootsData = await sRes.json();
                modelsData = await mRes.json();
                locationsData = await lRes.json();
                routesData = await rRes.json();
                updateStats();
                render();
                populateModelSelect();
            } catch (e) {
                console.error('Load failed:', e);
            }
        }

        function populateModelSelect() {
            const sel = document.getElementById('fModel');
            sel.innerHTML = modelsData.models.map(m =>
                `<option value="${m.id}">${m.name}</option>`
            ).join('');

            const locSel = document.getElementById('fLocationDb');
            if (locSel) {
                locSel.innerHTML = '<option value="">— Pick a known location —</option>' +
                    (locationsData.locations || []).map(l =>
                        `<option value="${l.id}">${l.name} (${l.area})</option>`
                    ).join('');
            }

            const routeSel = document.getElementById('fRoute');
            if (routeSel) {
                routeSel.innerHTML = '<option value="">— No route —</option>' +
                    (routesData.routes || []).map(r =>
                        `<option value="${r.id}">${r.title} (${r.distance})</option>`
                    ).join('');
            }
        }

        function getFiltered() {
            const query = document.getElementById('searchBox').value.toLowerCase().trim();
            let shoots = shootsData.shoots || [];

            if (query) {
                shoots = shoots.filter(s =>
                    s.title.toLowerCase().includes(query) ||
                    s.modelName.toLowerCase().includes(query) ||
                    (s.location || '').toLowerCase().includes(query) ||
                    (s.notes || '').toLowerCase().includes(query)
                );
            }

            if (currentFilter === 'collab') shoots = shoots.filter(function(s) { return s.type === 'collab' || s.type === 'paid'; });
            else if (currentFilter === 'event') shoots = shoots.filter(function(s) { return s.type === 'event'; });
            else if (currentFilter === 'paid') shoots = shoots.filter(function(s) { return s.payment === 'paid' || s.payment === 'unpaid' || s.payment === 'deposit'; });
            else if (currentFilter === 'hold') shoots = shoots.filter(function(s) { return !canRelease(s); });

            return shoots;
        }

        function canRelease(shoot) {
            return shoot.payment === 'tfp' || shoot.payment === 'paid' || shoot.payment === 'na';
        }

        function updateStats() {
            const shoots = shootsData.shoots || [];
            const upcoming = shoots.filter(s => ['concept', 'planned', 'scheduled'].includes(s.status)).length;
            const editing = shoots.filter(s => s.status === 'editing').length;
            const unpaid = shoots.filter(s => s.payment === 'unpaid' || s.payment === 'deposit').length;
            const revenue = shoots.reduce((sum, s) => {
                if (s.payment === 'paid' && s.totalAmount) return sum + s.totalAmount;
                if (s.payment === 'deposit' && s.depositAmount) return sum + s.depositAmount;
                return sum;
            }, 0);

            document.getElementById('stat-total').textContent = shoots.length;
            document.getElementById('stat-upcoming').textContent = upcoming;
            document.getElementById('stat-editing').textContent = editing;
            document.getElementById('stat-unpaid').textContent = unpaid;
            document.getElementById('stat-revenue').textContent = revenue > 0 ? `$${revenue}` : '$0';
        }

        function statusBadge(status) {
            const s = shootsData.statuses?.[status] || { label: status, color: '#9090a0' };
            return '<span class="status-badge" style="background:' + s.color + '20;color:' + s.color + '">' + s.label + '</span>';
        }

        function paymentBadge(payment) {
            const p = shootsData.paymentStatuses?.[payment] || { label: payment, color: '#9090a0' };
            return '<span class="payment-badge" style="background:' + p.color + '20;color:' + p.color + '">' + p.label + '</span>';
        }

        function typeBadge(type) {
            var t = (shootsData.shootTypes || {})[type] || { label: type, color: '#9090a0', icon: '📷' };
            return '<span class="status-badge" style="background:' + t.color + '20;color:' + t.color + '">' + t.icon + ' ' + t.label + '</span>';
        }

        function getModelNames(shoot) {
            var ids = shoot.modelIds || [shoot.modelId];
            return ids.map(function(id) {
                var m = (modelsData.models || []).find(function(m) { return m.id === id; });
                return m ? m.name : id;
            });
        }

        function render() {
            if (currentView === 'pipeline') renderPipeline();
            else renderTable();
        }

        let draggedShootId = null;

        function renderPipeline() {
            const shoots = getFiltered();
            const el = document.getElementById('pipelineView');

            el.innerHTML = STATUS_ORDER.map(status => {
                const s = shootsData.statuses?.[status] || { label: status, color: '#9090a0' };
                const cards = shoots.filter(sh => sh.status === status);
                return '<div class="pipeline-stage" data-status="' + status + '" ondragover="onDragOver(event)" ondrop="onDrop(event, \'' + status + '\')" ondragenter="onDragEnter(event)" ondragleave="onDragLeave(event)">' +
                    '<div class="pipeline-header" style="border-bottom-color:' + s.color + '">' +
                        '<span class="pipeline-title" style="color:' + s.color + '">' + s.label + '</span>' +
                        '<span class="pipeline-count">' + cards.length + '</span>' +
                    '</div>' +
                    (cards.length === 0 ? '<div class="pipeline-drop-zone" style="color:var(--text-muted);font-size:0.75rem;text-align:center;padding:1rem 0;">—</div>' :
                    cards.map(function(sh) {
                        var p = shootsData.paymentStatuses?.[sh.payment] || { label: sh.payment, color: '#9090a0' };
                        var t = (shootsData.shootTypes || {})[sh.type] || { label: '', color: '#9090a0', icon: '' };
                        var releaseIcon = !canRelease(sh) ? ' 🚫' : '';
                        var locCount = (sh.locationIds || []).length;
                        var locLabel = locCount > 0 ? ' 📍' + locCount : '';
                        var names = getModelNames(sh);
                        var modelDisplay = names.length > 2 ? names.slice(0, 2).join(', ') + ' +' + (names.length - 2) : names.join(', ');
                        var typeBorder = sh.type === 'event' ? 'border-left:3px solid ' + t.color + ';' : '';
                        return '<div class="pipeline-card" draggable="true" data-shoot-id="' + sh.id + '" style="' + typeBorder + '" ondragstart="onDragStart(event, \'' + sh.id + '\')" ondragend="onDragEnd(event)" onclick="editShoot(\'' + sh.id + '\')">' +
                            '<div class="pipeline-card-title">' + t.icon + ' ' + sh.title + releaseIcon + '</div>' +
                            '<div class="pipeline-card-model">' + modelDisplay + locLabel + '</div>' +
                            (sh.date ? '<div class="pipeline-card-date">' + sh.date + (sh.location ? ' · ' + sh.location : '') + '</div>' : '') +
                            '<div style="display:flex;gap:0.25rem;flex-wrap:wrap;margin-top:0.2rem;">' +
                            '<span class="pipeline-card-payment" style="background:' + p.color + '20;color:' + p.color + '">' + p.label + '</span>' +
                            (sh.type ? '<span class="pipeline-card-payment" style="background:' + t.color + '20;color:' + t.color + '">' + t.label + '</span>' : '') +
                            '</div>' +
                        '</div>';
                    }).join('')) +
                '</div>';
            }).join('');
        }

        function onDragStart(e, shootId) {
            draggedShootId = shootId;
            e.dataTransfer.effectAllowed = 'move';
            e.target.style.opacity = '0.4';
        }

        function onDragEnd(e) {
            e.target.style.opacity = '1';
            draggedShootId = null;
            // Remove all drag-over highlights
            document.querySelectorAll('.pipeline-stage').forEach(function(el) {
                el.classList.remove('drag-over');
            });
        }

        function onDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function onDragEnter(e) {
            e.preventDefault();
            var stage = e.target.closest('.pipeline-stage');
            if (stage) stage.classList.add('drag-over');
        }

        function onDragLeave(e) {
            var stage = e.target.closest('.pipeline-stage');
            if (stage && !stage.contains(e.relatedTarget)) {
                stage.classList.remove('drag-over');
            }
        }

        function onDrop(e, newStatus) {
            e.preventDefault();
            var stage = e.target.closest('.pipeline-stage');
            if (stage) stage.classList.remove('drag-over');

            if (!draggedShootId) return;

            var shoot = shootsData.shoots.find(function(s) { return s.id === draggedShootId; });
            if (!shoot || shoot.status === newStatus) return;

            shoot.status = newStatus;
            updateStats();
            renderPipeline();
            debounceSave();
            draggedShootId = null;
        }

        function renderTable() {
            let shoots = getFiltered();

            // Sort
            shoots.sort((a, b) => {
                let va = a[sortField] || '';
                let vb = b[sortField] || '';
                if (sortField === 'status') {
                    va = STATUS_ORDER.indexOf(a.status);
                    vb = STATUS_ORDER.indexOf(b.status);
                }
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                return 0;
            });

            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = shoots.map(function(s) {
                var release = canRelease(s)
                    ? '<span class="release-ok">✓ OK</span>'
                    : '<span class="release-warning">🚫 HOLD</span>';
                var names = getModelNames(s);
                var modelLinks = names.map(function(n, i) {
                    var mid = (s.modelIds || [s.modelId])[i];
                    return '<a href="models.html#' + mid + '" class="model-link">' + n + '</a>';
                }).join(', ');
                return '<tr onclick="editShoot(\'' + s.id + '\')" style="cursor:pointer">' +
                    '<td><strong>' + s.title + '</strong></td>' +
                    '<td>' + typeBadge(s.type || 'collab') + '</td>' +
                    '<td>' + modelLinks + '</td>' +
                    '<td>' + (s.date || '—') + '</td>' +
                    '<td>' + (s.location || '—') + '</td>' +
                    '<td>' + statusBadge(s.status) + '</td>' +
                    '<td>' + paymentBadge(s.payment) + '</td>' +
                    '<td>' + release + '</td>' +
                '</tr>';
            }).join('');
        }

        function setView(view, btn) {
            currentView = view;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('pipelineView').classList.toggle('active', view === 'pipeline');
            document.getElementById('pipelineView').style.display = view === 'pipeline' ? 'flex' : 'none';
            document.getElementById('tableView').classList.toggle('active', view === 'table');
            render();
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function sortBy(field) {
            if (sortField === field) sortAsc = !sortAsc;
            else { sortField = field; sortAsc = true; }
            render();
        }

        function editShoot(id) {
            const s = shootsData.shoots.find(x => x.id === id);
            if (!s) return;

            const statusOpts = Object.entries(shootsData.statuses || {}).map(([k, v]) =>
                `<option value="${k}" ${s.status === k ? 'selected' : ''}>${v.label}</option>`
            ).join('');

            const paymentOpts = Object.entries(shootsData.paymentStatuses || {}).map(([k, v]) =>
                `<option value="${k}" ${s.payment === k ? 'selected' : ''}>${v.label}</option>`
            ).join('');

            const pkgOpts = (shootsData.packages || []).map(p =>
                `<option value="${p.id}" ${s.packageType === p.id ? 'selected' : ''}>${p.name}${p.price ? ' ($' + p.price + ')' : ''}</option>`
            ).join('');

            const canRel = s.payment === 'tfp' || s.payment === 'paid' || s.payment === 'na';
            const releaseHtml = canRel
                ? '<div style="padding:0.5rem;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:6px;color:#22c55e;font-size:0.85rem;font-weight:600;">✅ Edits can be released</div>'
                : '<div style="padding:0.5rem;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:6px;color:#ef4444;font-size:0.85rem;font-weight:600;">🚫 HOLD — awaiting payment before releasing edits</div>';

            const historyHtml = (s.paymentHistory || []).length > 0
                ? s.paymentHistory.map(h => `<div style="display:flex;justify-content:space-between;padding:0.3rem 0;font-size:0.8rem;border-bottom:1px solid rgba(255,255,255,0.03);"><span>${h.date}</span><span>${h.type}</span><span style="color:var(--accent)">$${h.amount}</span><span style="color:var(--text-muted)">${h.method || ''}</span></div>`).join('')
                : '<div style="color:var(--text-muted);font-size:0.8rem;">No payments recorded yet.</div>';

            // Build linked locations HTML
            var linkedLocsHtml = (s.locationIds || []).map(function(lid) {
                var loc = (locationsData.locations || []).find(function(l) { return l.id === lid; });
                if (!loc) return '';
                return '<span style="display:inline-flex;align-items:center;gap:0.3rem;padding:0.2rem 0.5rem;background:rgba(212,175,55,0.15);border:1px solid rgba(212,175,55,0.3);border-radius:4px;font-size:0.75rem;color:#d4af37;">' + loc.name + '<span style="cursor:pointer;opacity:0.7;" onclick="removeLocation(\'' + s.id + '\',\'' + lid + '\')">&times;</span></span>';
            }).join('') || '<span style="font-size:0.8rem;color:var(--text-muted);">No locations linked</span>';

            // Build location picker options
            var locPickerOpts = (locationsData.locations || [])
                .filter(function(l) { return !(s.locationIds || []).includes(l.id); })
                .map(function(l) { return '<option value="' + l.id + '">' + l.name + ' (' + l.area + ')</option>'; }).join('');

            // Build route options
            var routeOptsHtml = (routesData.routes || []).map(function(r) {
                return '<option value="' + r.id + '"' + (s.routeId === r.id ? ' selected' : '') + '>' + r.title + ' (' + r.distance + ', ' + r.duration + ')</option>';
            }).join('');

            // Build modal content using string concat
            var html = '';
            html += '<h2>📋 ' + s.title + '</h2>';
            html += '<div style="display:flex;gap:0.75rem;margin-bottom:1rem;">';
            html += '<div style="flex:1;"><label class="form-label">Status</label>';
            html += '<select class="form-input" onchange="updateShootField(\'' + s.id + '\',\'status\',this.value)">' + statusOpts + '</select></div>';
            html += '<div style="flex:1;"><label class="form-label">Payment</label>';
            html += '<select class="form-input" onchange="updateShootField(\'' + s.id + '\',\'payment\',this.value)">' + paymentOpts + '</select></div>';
            html += '</div>';

            html += '<div style="display:flex;gap:0.75rem;margin-bottom:1rem;">';
            html += '<div style="flex:1;"><label class="form-label">Model</label>';
            html += '<div style="font-size:0.9rem;padding:0.5rem;color:var(--accent);">' + s.modelName + '</div></div>';
            html += '<div style="flex:1;"><label class="form-label">Date</label>';
            html += '<input class="form-input" type="date" value="' + (s.date || '') + '" onchange="updateShootField(\'' + s.id + '\',\'date\',this.value)"></div>';
            html += '</div>';

            html += '<div style="display:flex;gap:0.75rem;margin-bottom:1rem;">';
            html += '<div style="flex:1;"><label class="form-label">Primary Location</label>';
            html += '<input class="form-input" type="text" value="' + (s.location || '') + '" onchange="updateShootField(\'' + s.id + '\',\'location\',this.value)" placeholder="Freeform or use picker below"></div>';
            html += '<div style="flex:1;"><label class="form-label">Concept</label>';
            html += '<input class="form-input" type="text" value="' + (s.concept || '') + '" onchange="updateShootField(\'' + s.id + '\',\'concept\',this.value)"></div>';
            html += '</div>';

            // Linked locations section
            html += '<div style="margin-bottom:1rem;border:1px solid var(--border);border-radius:8px;padding:0.75rem;">';
            html += '<label class="form-label">📍 Linked Locations</label>';
            html += '<div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.5rem;">' + linkedLocsHtml + '</div>';
            html += '<div style="display:flex;gap:0.5rem;">';
            html += '<select class="form-input" id="loc-picker-' + s.id + '" style="flex:1;font-size:0.8rem;"><option value="">— Add location —</option>' + locPickerOpts + '</select>';
            html += '<button class="btn" style="font-size:0.8rem;padding:0.3rem 0.75rem;" onclick="addLocation(\'' + s.id + '\')">+ Add</button></div>';
            html += '<div style="margin-top:0.5rem;"><label class="form-label">🗺️ Route</label>';
            html += '<select class="form-input" style="font-size:0.8rem;" onchange="updateShootField(\'' + s.id + '\',\'routeId\',this.value||null);applyRoute(\'' + s.id + '\',this.value)">';
            html += '<option value="">— No route —</option>' + routeOptsHtml + '</select></div>';
            html += '</div>';

            html += '<div style="margin-bottom:1rem;"><label class="form-label">Notes</label>';
            html += '<textarea class="form-textarea" onchange="updateShootField(\'' + s.id + '\',\'notes\',this.value)">' + (s.notes || '') + '</textarea></div>';

            // Payment section
            html += '<div style="border-top:1px solid var(--border);padding-top:1rem;margin-bottom:1rem;">';
            html += '<h3 style="font-size:0.9rem;margin-bottom:0.75rem;">💰 Payment Details</h3>';
            html += releaseHtml;
            html += '<div style="display:flex;gap:0.75rem;margin-top:0.75rem;">';
            html += '<div style="flex:1;"><label class="form-label">Package</label>';
            html += '<select class="form-input" onchange="updateShootField(\'' + s.id + '\',\'packageType\',this.value)"><option value="">— Select —</option>' + pkgOpts + '</select></div>';
            html += '<div style="flex:1;"><label class="form-label">Total ($AUD)</label>';
            html += '<input class="form-input" type="number" value="' + (s.totalAmount || '') + '" onchange="updateShootField(\'' + s.id + '\',\'totalAmount\',parseFloat(this.value)||null)"></div>';
            html += '</div>';
            html += '<div style="display:flex;gap:0.75rem;margin-top:0.5rem;">';
            html += '<div style="flex:1;"><label class="form-label">Deposit ($AUD)</label>';
            html += '<input class="form-input" type="number" value="' + (s.depositAmount || '') + '" onchange="updateShootField(\'' + s.id + '\',\'depositAmount\',parseFloat(this.value)||null)"></div>';
            html += '<div style="flex:1;"><label class="form-label">Payment Link</label>';
            html += '<input class="form-input" type="text" value="' + (s.paymentLink || '') + '" placeholder="Future: Stripe link" disabled style="opacity:0.5;"></div>';
            html += '</div>';
            html += '<div style="margin-top:0.75rem;"><label class="form-label">Payment History</label>' + historyHtml;
            html += '<button class="btn" style="width:100%;margin-top:0.5rem;font-size:0.8rem;" onclick="addPayment(\'' + s.id + '\')">+ Record Payment</button></div>';
            html += '<div style="margin-top:0.5rem;"><label class="form-label">Payment Notes</label>';
            html += '<input class="form-input" type="text" value="' + (s.paymentNotes || '') + '" placeholder="e.g. Cash at shoot, bank transfer pending" onchange="updateShootField(\'' + s.id + '\',\'paymentNotes\',this.value)"></div>';
            html += '</div>';

            html += '<div class="modal-actions">';
            html += '<button class="btn" style="color:#ef4444;border-color:#ef4444;" onclick="if(confirm(\'Delete this shoot?\')){deleteShoot(\'' + s.id + '\')}">Delete</button>';
            html += '<div style="flex:1;"></div>';
            html += '<button class="btn btn-accent" onclick="closeAddShoot()">Done</button></div>';

            var modal = document.getElementById('addShootModal');
            modal.querySelector('.modal').innerHTML = html;
            modal.classList.add('open');
        }

        function updateShootField(id, field, value) {
            const s = shootsData.shoots.find(x => x.id === id);
            if (!s) return;
            s[field] = value;
            updateStats();
            render();
            debounceSave();
        }

        function addLocation(shootId) {
            const picker = document.getElementById(`loc-picker-${shootId}`);
            const locId = picker.value;
            if (!locId) return;

            const s = shootsData.shoots.find(x => x.id === shootId);
            if (!s) return;
            if (!s.locationIds) s.locationIds = [];
            if (s.locationIds.includes(locId)) return;

            s.locationIds.push(locId);

            // Auto-set primary location if empty
            if (!s.location) {
                const loc = locationsData.locations.find(l => l.id === locId);
                if (loc) s.location = loc.name;
            }

            // Update location shoot count
            updateLocationShootCounts();

            editShoot(shootId); // Re-render modal
            render();
            debounceSave();
        }

        function removeLocation(shootId, locId) {
            const s = shootsData.shoots.find(x => x.id === shootId);
            if (!s) return;
            s.locationIds = (s.locationIds || []).filter(id => id !== locId);
            updateLocationShootCounts();
            editShoot(shootId);
            render();
            debounceSave();
        }

        function applyRoute(shootId, routeId) {
            if (!routeId) return;
            const route = routesData.routes.find(r => r.id === routeId);
            const s = shootsData.shoots.find(x => x.id === shootId);
            if (!route || !s) return;

            // Add all route locations to shoot
            s.locationIds = [...new Set([...(s.locationIds || []), ...(route.locationIds || [])])];

            // Set primary location from route area if empty
            if (!s.location) s.location = route.area;

            updateLocationShootCounts();
            editShoot(shootId);
            render();
            debounceSave();
        }

        function updateLocationShootCounts() {
            // Recalculate shoot counts for all locations
            for (const loc of (locationsData.locations || [])) {
                loc.shootCount = shootsData.shoots.filter(s =>
                    (s.locationIds || []).includes(loc.id)
                ).length;
            }
            // Save locations too
            fetch(`${API}/locations`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(locationsData)
            }).catch(e => console.error('Location save failed:', e));
        }

        function addPayment(shootId) {
            const amount = prompt('Payment amount ($AUD):');
            if (!amount) return;
            const type = prompt('Type (deposit / final / other):', 'deposit');
            const method = prompt('Method (cash / bank / stripe):', 'bank');

            const s = shootsData.shoots.find(x => x.id === shootId);
            if (!s) return;
            if (!s.paymentHistory) s.paymentHistory = [];
            s.paymentHistory.push({
                date: new Date().toISOString().split('T')[0],
                amount: parseFloat(amount),
                type: type || 'deposit',
                method: method || '',
                reference: ''
            });

            // Auto-update deposit/total amounts
            const totalPaid = s.paymentHistory.reduce((sum, h) => sum + h.amount, 0);
            if (s.totalAmount && totalPaid >= s.totalAmount) {
                s.payment = 'paid';
            } else if (totalPaid > 0 && s.payment === 'unpaid') {
                s.payment = 'deposit';
                s.depositAmount = totalPaid;
            }

            editShoot(shootId); // Re-render modal
            updateStats();
            render();
            debounceSave();
        }

        function deleteShoot(id) {
            shootsData.shoots = shootsData.shoots.filter(s => s.id !== id);
            closeAddShoot();
            updateStats();
            render();
            debounceSave();
        }

        let shootSaveTimeout = null;
        function debounceSave() {
            clearTimeout(shootSaveTimeout);
            shootSaveTimeout = setTimeout(async () => {
                try {
                    await fetch(API + '/shoots', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(shootsData)
                    });
                } catch(e) { console.error('Save failed:', e); }
            }, 800);
        }

        // Add shoot modal
        function openAddShoot() { document.getElementById('addShootModal').classList.add('open'); }
        function closeAddShoot() { document.getElementById('addShootModal').classList.remove('open'); }

        async function saveShoot() {
            const title = document.getElementById('fTitle').value.trim();
            const modelSelect = document.getElementById('fModel');
            const selectedModelIds = Array.from(modelSelect.selectedOptions).map(function(o) { return o.value; });
            if (!title || selectedModelIds.length === 0) return alert('Title and at least one Model are required');

            const shootType = document.getElementById('fType').value;
            const model = modelsData.models.find(function(m) { return m.id === selectedModelIds[0]; });
            const locDbId = document.getElementById('fLocationDb').value;
            const routeId = document.getElementById('fRoute').value || null;
            let locationIds = [];

            // Add selected location
            if (locDbId) locationIds.push(locDbId);

            // If route selected, add all route locations
            if (routeId) {
                const route = routesData.routes.find(r => r.id === routeId);
                if (route) {
                    locationIds = [...new Set([...locationIds, ...(route.locationIds || [])])];
                }
            }

            const modelId = selectedModelIds[0];
            const newShoot = {
                id: modelId + '-' + title.toLowerCase().replace(/[^a-z0-9]+/g, '-'),
                modelId: modelId,
                modelIds: selectedModelIds,
                modelName: model ? model.name : modelId,
                type: shootType,
                title: title,
                date: document.getElementById('fDate').value || null,
                location: document.getElementById('fLocation').value.trim() || null,
                concept: document.getElementById('fConcept').value.trim() || null,
                description: '',
                status: document.getElementById('fStatus').value,
                payment: document.getElementById('fPayment').value,
                depositAmount: null,
                totalAmount: parseFloat(document.getElementById('fAmount').value) || null,
                paymentNotes: '',
                paymentHistory: [],
                invoiceId: null,
                paymentLink: null,
                packageType: null,
                currency: 'AUD',
                collabPage: null,
                shootPage: `/${modelId}/`,
                publishedToShoots: false,
                locationIds: locationIds,
                routeId: routeId,
                notes: document.getElementById('fNotes').value.trim(),
                created: new Date().toISOString().split('T')[0]
            };

            shootsData.shoots.push(newShoot);

            try {
                await fetch(`${API}/shoots`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(shootsData)
                });
            } catch (e) {
                console.error('Save failed:', e);
            }

            closeAddShoot();
            updateStats();
            render();

            // Clear form
            document.getElementById('fTitle').value = '';
            document.getElementById('fDate').value = '';
            document.getElementById('fLocation').value = '';
            document.getElementById('fConcept').value = '';
            document.getElementById('fNotes').value = '';
            document.getElementById('fAmount').value = '';
        }

        loadData();
    </script>
    <script src="shared.js"></script>
</body>
</html>
