<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule | Quinn & Adam</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        .page-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .page-title {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .page-title h1 {
            font-size: 1.75rem;
            font-weight: 600;
        }

        .page-subtitle {
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        /* Schedule Grid */
        .schedule-grid {
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .schedule-header {
            background: var(--bg-card);
            padding: 1rem 0.5rem;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .schedule-header.time-col {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .time-slot {
            background: var(--bg-card);
            padding: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-align: right;
            padding-right: 0.75rem;
            min-height: 60px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
        }

        .day-slot {
            background: var(--bg-primary);
            min-height: 60px;
            padding: 0.25rem;
            position: relative;
        }

        .schedule-item {
            padding: 0.35rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-bottom: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.35rem;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .schedule-item:hover {
            transform: scale(1.02);
        }

        .schedule-item.system { background: rgba(34, 197, 94, 0.2); border-left: 3px solid #22c55e; }
        .schedule-item.communication { background: rgba(59, 130, 246, 0.2); border-left: 3px solid #3b82f6; }
        .schedule-item.research { background: rgba(168, 85, 247, 0.2); border-left: 3px solid #a855f7; }
        .schedule-item.backup { background: rgba(245, 158, 11, 0.2); border-left: 3px solid #f59e0b; }

        .schedule-item .icon {
            font-size: 0.8rem;
        }

        .schedule-item .name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* All Day Row */
        .all-day-row {
            display: grid;
            grid-template-columns: 80px repeat(7, 1fr);
            gap: 1px;
            background: var(--border);
            margin-bottom: 1px;
        }

        .all-day-label {
            background: var(--bg-card);
            padding: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-align: right;
            padding-right: 0.75rem;
        }

        .all-day-slot {
            background: var(--bg-primary);
            padding: 0.25rem;
            min-height: 40px;
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            padding: 1rem 1.5rem;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }

        /* Task List */
        .task-list {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
        }

        .task-list h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .task-item {
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-icon {
            font-size: 1.5rem;
            width: 40px;
            text-align: center;
        }

        .task-info {
            flex: 1;
        }

        .task-info h3 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .task-info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .task-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .task-meta span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .category-tag {
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .category-tag.system { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .category-tag.communication { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .category-tag.research { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
        .category-tag.backup { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
    </style>
</head>
<body>
    <div id="shared-header"></div>
    
    <div class="page-container">
        <div class="page-header">
            <div>
                <div class="page-title">
                    <span style="font-size: 1.75rem;">📅</span>
                    <h1>System Schedule</h1>
                </div>
                <p class="page-subtitle">Quinn's automated tasks and recurring activities</p>
            </div>
        </div>

        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot" style="background: #22c55e;"></div>
                <span>System</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #3b82f6;"></div>
                <span>Communication</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #a855f7;"></div>
                <span>Research</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot" style="background: #f59e0b;"></div>
                <span>Backup</span>
            </div>
        </div>

        <!-- Week View -->
        <div class="schedule-grid" id="schedule-grid">
            <!-- Header Row -->
            <div class="schedule-header time-col">Time</div>
            <div class="schedule-header">Mon</div>
            <div class="schedule-header">Tue</div>
            <div class="schedule-header">Wed</div>
            <div class="schedule-header">Thu</div>
            <div class="schedule-header">Fri</div>
            <div class="schedule-header">Sat</div>
            <div class="schedule-header">Sun</div>
            <!-- Generated by JS -->
        </div>

        <!-- Task Details -->
        <div class="task-list">
            <h2>📋 All Scheduled Tasks</h2>
            <div id="task-details">
                <!-- Generated by JS -->
            </div>
        </div>
    </div>
    
    <div id="shared-footer"></div>

    <script>
        // Ordered from waking hours through to overnight (human-friendly)
        const timeSlots = ['All Day', '07:00', '12:00', '18:00', '23:00', '01:00', '02:00', '03:00'];
        const days = ['mon', 'tue', 'wed', 'thu', 'fri', 'sat', 'sun'];
        const dayLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

        async function loadSchedule() {
            try {
                const response = await fetch('data/schedule.json');
                const data = await response.json();
                renderScheduleGrid(data);
                renderTaskList(data);
            } catch (e) {
                console.error('Failed to load schedule:', e);
            }
        }

        function renderScheduleGrid(data) {
            const grid = document.getElementById('schedule-grid');
            grid.innerHTML = '';

            // Header row
            grid.innerHTML += '<div class="schedule-header time-col">Time</div>';
            dayLabels.forEach(d => {
                grid.innerHTML += `<div class="schedule-header">${d}</div>`;
            });

            // Time slot rows
            timeSlots.forEach(time => {
                // Time label
                grid.innerHTML += `<div class="time-slot">${time}</div>`;

                // Day cells
                days.forEach(day => {
                    let cellContent = '';

                    // Find matching tasks
                    data.recurring.forEach(task => {
                        const matchesDay = task.days.includes(day) || task.days.length === 7;
                        const matchesTime = time === 'All Day' 
                            ? task.times.includes('all day')
                            : task.times.includes(time);

                        if (matchesDay && matchesTime) {
                            cellContent += `<div class="schedule-item ${task.category}" title="${task.description}">
                                <span class="icon">${task.icon}</span>
                                <span class="name">${task.name}</span>
                            </div>`;
                        }
                    });

                    grid.innerHTML += `<div class="day-slot">${cellContent}</div>`;
                });
            });
        }

        function renderTaskList(data) {
            const container = document.getElementById('task-details');
            
            container.innerHTML = data.recurring.map(task => `
                <div class="task-item">
                    <div class="task-icon">${task.icon}</div>
                    <div class="task-info">
                        <h3>${task.name}</h3>
                        <p>${task.description}</p>
                        <div class="task-meta">
                            <span>🕐 ${task.frequency}</span>
                            <span>📆 ${task.days.length === 7 ? 'Every day' : task.days.length === 0 ? 'On demand' : task.days.join(', ')}</span>
                            <span class="category-tag ${task.category}">${task.category}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        loadSchedule();
    </script>
    <script src="shared.js"></script>
</body>
</html>
